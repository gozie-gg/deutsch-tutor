    // ── INTRO SCREEN ─────────────────────────────────────────────────────
    if (exam.phase === 'intro') {
      app.innerHTML = `<div class="scroll fade">
        <div class="hdr">
          <button class="back" id="back">←</button>
          <div style="flex:1"><div class="t2">${template.emoji} ${template.title}</div><div class="muted">${template.subtitle}</div></div>
        </div>
        <div style="padding:0 16px">
          <div class="card" style="padding:16px">
            <div class="t3" style="margin-bottom:8px">What to expect</div>
            ${template.sections.map((s, i) => `
              <div style="display:flex;justify-content:space-between;padding:6px 0;${i < template.sections.length - 1 ? 'border-bottom:1px solid var(--border)' : ''}">
                <div>
                  <div style="font-weight:600;font-size:13px">${s.title}</div>
                  <div class="muted" style="font-size:11px">${s.count} items · ${s.timeMin} min</div>
                </div>
                <div style="font-size:11px;color:var(--muted);align-self:center">${s.type}</div>
              </div>
            `).join('')}
            <div style="display:flex;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-weight:600;font-size:13px">
              <span>Pass threshold</span>
              <span>${Math.round(template.passThreshold * 100)}% overall</span>
            </div>
          </div>
          <div class="card card-info" style="font-size:12px">
            <strong>⚠️ Exam rules:</strong> Each section has its own timer. When time runs out, you're moved to the next section. The AI grades writing & speaking — give it your best honest attempt.
          </div>
          <button class="btn btn-dark" id="begin-exam" style="margin-top:10px">Begin exam →</button>
        </div>
      </div>`;

      document.getElementById('back')?.addEventListener('click', abandonExam);
      document.getElementById('begin-exam')?.addEventListener('click', () => beginExamSection(0));
      return;
    }

    // ── BETWEEN SECTIONS ─────────────────────────────────────────────────
    if (exam.phase === 'between') {
      const prevSection = template.sections[exam.sectionIdx - 1];
      const nextSection = template.sections[exam.sectionIdx];
      const prevAnswers = exam.answers[prevSection.id] || [];
      const prevScore = prevAnswers.length > 0 ? prevAnswers.reduce((a, x) => a + (x.score || 0), 0) / prevAnswers.length : 0;

      app.innerHTML = `<div class="scroll fade">
        <div class="hdr">
          <div style="flex:1"><div class="t2">${template.title}</div><div class="muted">Section ${exam.sectionIdx} of ${template.sections.length} complete</div></div>
        </div>
        <div style="padding:0 16px">
          <div class="card" style="text-align:center;padding:24px">
            <div style="font-size:40px;margin-bottom:4px">${prevScore >= 0.6 ? '✓' : '📝'}</div>
            <div class="t2">${prevSection.title}</div>
            <div style="font-size:28px;font-weight:700;margin:8px 0">${Math.round(prevScore * 100)}%</div>
            <div class="muted">Next up: <strong>${nextSection.title}</strong> (${nextSection.timeMin} min)</div>
          </div>
          <button class="btn btn-dark" id="next-section">Start ${nextSection.title} →</button>
          <button class="btn" id="abandon-exam" style="margin-top:8px">Abandon exam</button>
        </div>
      </div>`;
      document.getElementById('next-section')?.addEventListener('click', () => beginExamSection(exam.sectionIdx));
      document.getElementById('abandon-exam')?.addEventListener('click', () => { if (confirm('Abandon this exam? Your progress will be discarded.')) abandonExam(); });
      return;
    }

    // ── RESULT SCREEN ────────────────────────────────────────────────────
    if (exam.phase === 'result') {
      const r = exam.result;
      app.innerHTML = `<div class="scroll fade">
        <div class="hdr">
          <button class="back" id="back">←</button>
          <div style="flex:1"><div class="t2">${template.title}</div><div class="muted">Results</div></div>
        </div>
        <div style="padding:0 16px">
          <div class="card" style="text-align:center;padding:30px 16px;background:${r.passed ? 'linear-gradient(135deg,#d1fae5,#a7f3d0)' : 'linear-gradient(135deg,#fee2e2,#fecaca)'};border-color:${r.passed ? '#10b981' : '#ef4444'}">
            <div style="font-size:56px">${r.passed ? '🎉' : '📖'}</div>
            <div class="t1" style="color:#111">${r.passed ? 'Bestanden!' : 'Noch nicht bestanden'}</div>
            <div style="font-size:36px;font-weight:700;margin:8px 0;color:#111">${Math.round(r.overall * 100)}%</div>
            <div style="color:#444;font-size:13px">${r.passed ? `You passed! (threshold ${Math.round(template.passThreshold*100)}%)` : `Below ${Math.round(template.passThreshold*100)}% threshold — worth a retake`}</div>
          </div>
          <div class="section-title">Per-section breakdown</div>
          ${r.perSection.map(s => {
            const pct = Math.round(s.score * 100);
            const pass = s.score >= template.passThreshold;
            return `<div class="card" style="padding:12px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
                <span style="font-weight:600">${s.title}</span>
                <span style="font-weight:700;color:${pass ? '#10b981' : '#b91c1c'}">${pct}%</span>
              </div>
              <div class="pbar" style="height:6px"><div class="pfill" style="width:${pct}%;background:${pass ? '#10b981' : '#ef4444'}"></div></div>
              <div class="muted" style="font-size:11px;margin-top:4px">${s.answered}/${s.total} answered</div>
            </div>`;
          }).join('')}
          <div style="display:flex;gap:6px;margin-top:14px">
            <button class="btn" id="retry-exam" style="flex:1">Retake</button>
            <button class="btn btn-dark" id="finish-exam" style="flex:1">Done →</button>
          </div>
        </div>
      </div>`;

      document.getElementById('back')?.addEventListener('click', abandonExam);
      document.getElementById('finish-exam')?.addEventListener('click', abandonExam);
      document.getElementById('retry-exam')?.addEventListener('click', () => startExam(exam.key));
      return;
    }

    // ── RUNNING A SECTION ────────────────────────────────────────────────
    if (exam.phase === 'running') {
      const item = exam.items?.[exam.itemIdx];
      const remainingMs = Math.max(0, exam.sectionDeadline - Date.now());
      const m = Math.floor(remainingMs / 60000);
      const s = Math.floor((remainingMs % 60000) / 1000);
      const timerText = `${m}:${s.toString().padStart(2,'0')}`;
      const urgent = remainingMs < 60000;

      let bodyHtml;
      if (exam.loading) {
        bodyHtml = `<div class="loader"><div class="loader-icon">⚙️</div><div>${exam.items?.length ? 'Grading...' : 'Preparing section...'}</div></div>`;
      } else if (!item) {
        bodyHtml = `<div class="card" style="text-align:center"><div class="muted">Section ready — tap continue</div><button class="btn btn-dark" id="retry-section" style="margin-top:10px">Continue →</button></div>`;
      } else if (section.type === 'mixed' || section.type === 'listening') {
        bodyHtml = `
          ${section.type === 'listening' ? `
            <div class="card" style="text-align:center;padding:22px 16px">
              <div class="muted" style="font-size:11px;margin-bottom:8px">Listen to the audio</div>
              <button class="btn btn-dark" id="play-audio" style="max-width:220px;margin:0 auto">
                ${STATE.speaking ? '🔊 Playing...' : '▶️ Play audio'}
              </button>
            </div>
          ` : ''}
          <div class="card" style="padding:16px">
            <div style="font-weight:700;font-size:15px;margin-bottom:10px">${item.question}</div>
            ${(item.options || []).map((opt, i) => {
              const letter = ['A','B','C','D'][i];
              return `<button class="mc-opt" data-ans="${letter}">${letter}. ${opt}</button>`;
            }).join('')}
          </div>
        `;
      } else if (section.type === 'reading') {
        bodyHtml = `
          <div class="card" style="padding:16px;background:var(--surface)">
            <div style="font-size:13px;line-height:1.6;white-space:pre-wrap">${item.text}</div>
          </div>
          <div class="card" style="padding:16px">
            <div style="font-weight:700;font-size:14px;margin-bottom:10px">${item.question}</div>
            ${(item.options || []).map((opt, i) => {
              const letter = ['A','B','C','D'][i];
              return `<button class="mc-opt" data-ans="${letter}">${letter}. ${opt}</button>`;
            }).join('')}
          </div>
        `;
      } else if (section.type === 'writing') {
        bodyHtml = `
          <div class="card" style="padding:16px">
            <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.9px;margin-bottom:6px">Task ${exam.itemIdx + 1} of ${exam.items.length}</div>
            <div style="font-weight:700;font-size:14px;margin-bottom:4px">${item.task}</div>
            <div class="muted" style="font-size:12px;margin-bottom:8px">${item.context || ''}</div>
            ${item.pointsToInclude?.length ? `
              <div style="padding:8px;background:var(--surface);border-radius:8px;margin-bottom:10px">
                <div style="font-size:11px;font-weight:700;margin-bottom:4px">Include these points:</div>
                ${item.pointsToInclude.map(p => `<div style="font-size:12px">• ${p}</div>`).join('')}
              </div>
            ` : ''}
            <div class="muted" style="font-size:11px;margin-bottom:4px">Write at least ${item.minWords || 30} words in German</div>
            <textarea id="write-answer" style="min-height:140px" placeholder="Schreibe deine Antwort auf Deutsch...">${exam.response}</textarea>
            ${umlauts()}
            <button class="btn btn-dark" id="submit-write" style="margin-top:8px" ${!exam.response.trim() ? 'disabled' : ''}>Submit answer →</button>
          </div>
        `;
      } else if (section.type === 'speaking') {
        bodyHtml = `
          <div class="card" style="padding:16px">
            <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.9px;margin-bottom:6px">Task ${exam.itemIdx + 1} of ${exam.items.length}</div>
            <div style="font-weight:700;font-size:15px;margin-bottom:6px">${item.task}</div>
            ${item.pointsToInclude?.length ? `
              <div style="padding:8px;background:var(--surface);border-radius:8px;margin:6px 0 10px">
                ${item.pointsToInclude.map(p => `<div style="font-size:12px">• ${p}</div>`).join('')}
              </div>
            ` : ''}
            ${item.example ? `<div class="muted" style="font-size:11px;font-style:italic;margin-bottom:10px">Example phrasing: "${item.example}"</div>` : ''}
            ${!STATE.voiceOk ? `<div class="card-info" style="font-size:12px">Speech recognition unavailable — type your answer instead</div>
              <textarea id="write-answer" style="min-height:80px" placeholder="Type what you would say aloud...">${exam.response}</textarea>
              ${umlauts()}
              <button class="btn btn-dark" id="submit-speak-text" style="margin-top:8px" ${!exam.response.trim() ? 'disabled' : ''}>Submit →</button>
            ` : `
              <button class="btn btn-dark" id="start-speak" style="padding:16px">
                ${STATE.listening ? '🎙️ Listening...' : exam.speechTranscript ? '🔁 Try again' : '🎤 Tap to speak'}
              </button>
              ${exam.speechTranscript ? `
                <div class="card card-info" style="margin-top:10px">
                  <div style="font-size:11px;font-weight:700;margin-bottom:4px">I heard:</div>
                  <div style="font-size:13px">"${exam.speechTranscript}"</div>
                </div>
                <button class="btn btn-dark" id="submit-speak" style="margin-top:8px">Submit this →</button>
              ` : ''}
            `}
          </div>
        `;
      }

      app.innerHTML = `<div class="scroll fade">
        <div class="hdr">
          <button class="back" id="back">←</button>
          <div style="flex:1"><div class="t2">${section.title}</div><div class="muted">Item ${exam.itemIdx + 1}/${exam.items?.length || section.count}</div></div>
          <div class="exam-timer ${urgent ? 'urgent' : ''}">${timerText}</div>
        </div>
        <div class="ex-dots">
          ${Array.from({length: section.count}).map((_, i) => {
            const answered = exam.answers[section.id]?.[i];
            const cls = answered ? (answered.correct === true || answered.score >= 0.6 ? 'done' : 'fail') : i === exam.itemIdx ? 'active' : 'todo';
            return `<div class="ex-dot ${cls}"></div>`;
          }).join('')}
        </div>
        <div style="padding:12px 16px">${bodyHtml}</div>
      </div>`;

      document.getElementById('back')?.addEventListener('click', () => {
        if (confirm('Abandon this exam? Your progress will be discarded.')) abandonExam();
      });
      document.getElementById('play-audio')?.addEventListener('click', () => { if (item?.audio) speak(item.audio); });
      document.querySelectorAll('[data-ans]').forEach(btn => {
        btn.addEventListener('click', () => submitExamAnswer(btn.dataset.ans));
      });
      const ta = document.getElementById('write-answer');
      if (ta) {
        STATE.lastInput = ta;
        ta.addEventListener('input', e => { STATE.exam.response = e.target.value; });
        ta.focus();
      }
      document.getElementById('submit-write')?.addEventListener('click', () => submitExamAnswer(exam.response));
      document.getElementById('submit-speak-text')?.addEventListener('click', () => submitExamAnswer(exam.response));
      document.getElementById('start-speak')?.addEventListener('click', () => {
        startListen(transcript => { STATE.exam.speechTranscript = transcript; render(); });
      });
      document.getElementById('submit-speak')?.addEventListener('click', () => submitExamAnswer(exam.speechTranscript));
      return;
    }
  }

  // ── EXERCISE DATABASE (pull-and-store corpus) ───────────────────────────────
  else if (view === 'corpus') {
    const corpus = STATE.corpus;
    const all = Object.values(corpus.exercises || {});
    const flagged = all.filter(e => e.review?.flaggedBad);
    const byLevel = all.reduce((acc, e) => { acc[e.level] = (acc[e.level]||0)+1; return acc; }, {});
    const byDiff = all.reduce((acc, e) => { acc[e.difficulty] = (acc[e.difficulty]||0)+1; return acc; }, {});
    const byType = all.reduce((acc, e) => { acc[e.type] = (acc[e.type]||0)+1; return acc; }, {});
    const byProvider = all.reduce((acc, e) => { const p = e.provenance?.generatedBy || 'unknown'; acc[p] = (acc[p]||0)+1; return acc; }, {});
    const filter = STATE.corpusFilter || 'all';
    const visible = filter === 'flagged' ? flagged : filter === 'verified' ? all.filter(e => e.review?.humanVerified) : all;
    const sorted = [...visible].sort((a, b) => (b.provenance?.generatedAt || 0) - (a.provenance?.generatedAt || 0));

    const statRow = (label, value, color) => `<div style="flex:1;min-width:70px;text-align:center;padding:8px;background:${color};border-radius:10px">
      <div style="font-size:22px;font-weight:700">${value}</div>
      <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px">${label}</div>
    </div>`;

    app.innerHTML = `<div class="scroll fade">
      <div class="hdr">
        <button class="back" id="back">←</button>
        <div style="flex:1">
          <div class="t2">🗃️ Exercise Database</div>
          <div class="muted">${all.length} unique · ${corpus.meta?.totalServed || 0} served · ${flagged.length} flagged</div>
        </div>
      </div>
      <div style="padding:0 16px">
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
          ${statRow('Unique', all.length, '#e0e7ff')}
          ${statRow('Served', corpus.meta?.totalServed || 0, '#d1fae5')}
          ${statRow('Flagged', flagged.length, '#fee2e2')}
        </div>

        <div class="card" style="padding:12px">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:6px">By Level</div>
          ${Object.entries(byLevel).map(([k,v]) => `<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0"><span>${k}</span><span style="font-weight:600">${v}</span></div>`).join('') || '<div class="muted" style="font-size:12px">No data yet</div>'}
        </div>
        <div class="card" style="padding:12px">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:6px">By Difficulty</div>
          ${Object.entries(byDiff).map(([k,v]) => `<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0"><span>${k}</span><span style="font-weight:600">${v}</span></div>`).join('') || '<div class="muted" style="font-size:12px">No data yet</div>'}
        </div>
        <div class="card" style="padding:12px">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:6px">By Type</div>
          ${Object.entries(byType).map(([k,v]) => `<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0"><span>${k}</span><span style="font-weight:600">${v}</span></div>`).join('') || '<div class="muted" style="font-size:12px">No data yet</div>'}
        </div>
        <div class="card" style="padding:12px">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:6px">By Provider</div>
          ${Object.entries(byProvider).map(([k,v]) => `<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0"><span style="min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${k}</span><span style="font-weight:600">${v}</span></div>`).join('') || '<div class="muted" style="font-size:12px">No data yet</div>'}
        </div>

        <div style="display:flex;gap:6px;margin-top:14px">
          <button class="btn btn-dark" id="export-corpus" style="flex:1;font-size:12px;padding:10px">📥 Export Corpus</button>
          <button class="btn" id="export-all" style="flex:1;font-size:12px;padding:10px">📦 Full Backup</button>
        </div>

        <div class="section-title">Browse</div>
        <div style="display:flex;gap:6px;margin-bottom:10px">
          <button class="btn" data-filter="all" style="flex:1;padding:7px;font-size:11px;${filter==='all'?'background:var(--ink);color:var(--paper)':''}">All (${all.length})</button>
          <button class="btn" data-filter="flagged" style="flex:1;padding:7px;font-size:11px;${filter==='flagged'?'background:var(--ink);color:var(--paper)':''}">🚩 Flagged (${flagged.length})</button>
          <button class="btn" data-filter="verified" style="flex:1;padding:7px;font-size:11px;${filter==='verified'?'background:var(--ink);color:var(--paper)':''}">✓ Verified (${all.filter(e=>e.review?.humanVerified).length})</button>
        </div>

        ${sorted.length === 0 ? `
          <div class="card" style="text-align:center;padding:20px">
            <div class="muted">${filter === 'all' ? 'No exercises captured yet. Run a lesson to start populating the corpus.' : 'No exercises match this filter.'}</div>
          </div>
        ` : sorted.slice(0, 40).map(e => {
          const successPct = e.stats?.successRate !== null && e.stats?.successRate !== undefined ? Math.round(e.stats.successRate * 100) + '%' : '—';
          return `<div class="card" style="padding:10px 12px;border-left:3px solid ${e.review?.flaggedBad ? '#ef4444' : e.review?.humanVerified ? '#10b981' : '#e5e5e0'}">
            <div style="display:flex;justify-content:space-between;align-items:start;gap:8px;margin-bottom:4px">
              <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px">
                ${e.level} · ${e.difficulty} · ${e.type}
              </div>
              <div style="font-size:10px;color:var(--muted)">served ${e.stats?.timesServed||0}× · ${successPct}</div>
            </div>
            <div style="font-size:13px;margin-bottom:3px"><strong>Q:</strong> ${e.question}</div>
            <div style="font-size:12px;color:var(--success)"><strong>A:</strong> ${e.answer}</div>
            ${e.grammarTags?.length ? `<div style="margin-top:4px">${e.grammarTags.map(t => `<span style="font-size:10px;background:#e0e7ff;color:#3730a3;padding:1px 6px;border-radius:8px;margin-right:3px">${t}</span>`).join('')}</div>` : ''}
            ${e.review?.flaggedBad ? `<div style="margin-top:5px;font-size:11px;color:#b91c1c">🚩 ${e.review.flaggedReason || 'flagged'} · <a href="#" data-unflag="${e.hash}" style="color:#b91c1c;text-decoration:underline">unflag</a></div>` : ''}
          </div>`;
        }).join('')}
        ${sorted.length > 40 ? `<div class="muted" style="text-align:center;font-size:11px;padding:10px">Showing 40 of ${sorted.length}. Export to see all.</div>` : ''}
      </div>
    </div>`;

    document.getElementById('back')?.addEventListener('click', () => { STATE.view = 'home'; render(); });
    document.getElementById('export-corpus')?.addEventListener('click', () => exportCorpusJson({ includeAll: false }));
    document.getElementById('export-all')?.addEventListener('click', () => exportCorpusJson({ includeAll: true }));
    document.querySelectorAll('[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => { STATE.corpusFilter = btn.dataset.filter; render(); });
    });
    document.querySelectorAll('[data-unflag]').forEach(btn => {
      btn.addEventListener('click', (e) => { e.preventDefault(); unflagExercise(btn.dataset.unflag); render(); });
    });
  }

  // ── MISTAKE JOURNAL ─────────────────────────────────────────────────────────
  else if (view === 'mistakes') {
    const list = [...(STATE.mistakes || [])].reverse(); // newest first
    app.innerHTML = `<div class="scroll fade">
      <div class="hdr">
        <button class="back" id="back">←</button>
        <div style="flex:1">
          <div class="t2">📘 Mistake Journal</div>
          <div class="muted">${list.length} entr${list.length === 1 ? 'y' : 'ies'} · learn from your errors</div>
        </div>
      </div>
      <div style="padding:0 16px">
        ${list.length === 0 ? `
          <div class="card" style="text-align:center;padding:28px">
            <div style="font-size:40px;margin-bottom:8px">✨</div>
            <div class="t3">No mistakes yet!</div>
            <div class="muted" style="margin-top:4px">Get something wrong during an exercise, and it'll show up here.</div>
          </div>
        ` : `
          <div style="display:flex;gap:8px;margin-bottom:10px">
            <button class="btn" id="clear-all" style="flex:1">Clear all</button>
          </div>
          ${list.map((m, idx) => {
            const realIdx = (STATE.mistakes.length - 1) - idx;
            const age = Math.max(1, Math.round((Date.now() - m.when) / 60000));
            const ageText = age < 60 ? `${age}m ago` : age < 1440 ? `${Math.round(age/60)}h ago` : `${Math.round(age/1440)}d ago`;
            const typeIcon = m.type === 'vocab' ? '📚' : m.type === 'rf' ? '⚡' : '✏️';
            return `<div class="card" style="padding:12px">
              <div style="display:flex;justify-content:space-between;align-items:start;gap:8px;margin-bottom:6px">
                <div style="font-size:11px;color:var(--muted)">${typeIcon} ${m.lessonTitle || 'Exercise'} · ${ageText}</div>
                <button class="btn" data-resolve="${realIdx}" style="padding:3px 8px;font-size:10px;width:auto">✓ Got it</button>
              </div>
              <div style="font-weight:600;margin-bottom:4px;font-size:13px">${m.question || ''}</div>

                <strong>You wrote:</strong> ${STATE.listenAnswer}
              </div>
              <div class="grade-correction">🎯 ${STATE.listenGrade.target} ${speakBtn(STATE.listenGrade.target, {size:'md'})}</div>
              <div style="margin-top:4px;font-size:12px;opacity:.85"><em>${STATE.listenGrade.en}</em></div>
            </div>
            <button class="btn btn-dark" id="next-listen" style="margin-top:10px">
              ${STATE.listenIdx + 1 >= total ? 'Finish Listening →' : 'Next →'}
            </button>
          `}
        </div>
      `}
    </div>`;

    document.getElementById('back')?.addEventListener('click', () => { STATE.phase = 'lesson'; render(); });
    document.getElementById('skip-listen')?.addEventListener('click', () => nextPhase());
    document.getElementById('replay')?.addEventListener('click', () => {
      if (item) { speak(item.de); STATE.listenPlayed++; }
    });
    const ta = document.getElementById('listen-ans');
    if (ta) {
      STATE.lastInput = ta;
      ta.addEventListener('input', e => STATE.listenAnswer = e.target.value);
      ta.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitListenAnswer(); } });
      ta.focus();
    }
    document.getElementById('submit-listen')?.addEventListener('click', submitListenAnswer);
    document.getElementById('next-listen')?.addEventListener('click', nextListenItem);
  }

  // ── SPEAKING PHASE ─────────────────────────────────────────────────────────
  else if (view === 'lesson' && phase === 'speak') {
    const item = STATE.speakItems[STATE.speakIdx];
    const total = STATE.speakItems.length;
    app.innerHTML = `<div class="scroll fade">
      <div class="hdr">
        <button class="back" id="back">←</button>
        <div style="flex:1">
          <div class="t2">🎤 Speaking</div>
          <div class="muted">${lesson.title}</div>
        </div>
        <span class="dbadge d-x">Sprechen</span>
      </div>
      ${STATE.speakLoading ? `
        <div class="loader"><div class="loader-icon">⚙️</div><div>Preparing pronunciation drill...</div></div>
      ` : !item ? `
        <div style="padding:16px">
          <div class="card" style="text-align:center;padding:20px">
            <div class="muted">Couldn't load speaking items. Skipping.</div>
            <button class="btn btn-dark" id="skip-speak" style="margin-top:12px">Continue →</button>
          </div>
        </div>
      ` : !STATE.voiceOk ? `
        <div style="padding:16px">
          <div class="card" style="text-align:center;padding:20px">
            <div class="muted">Your browser doesn't support speech recognition. Skipping speaking practice.</div>
            <button class="btn btn-dark" id="skip-speak" style="margin-top:12px">Continue →</button>
          </div>
        </div>
      ` : `
        <div style="padding:0 16px">
          <div class="card card-info" style="margin-bottom:10px">
            <div>Question ${STATE.speakIdx + 1}/${total} · Pronunciation</div>
          </div>
          <div class="card" style="text-align:center;padding:28px 16px">
            <div class="muted" style="font-size:11px;margin-bottom:10px">Say this aloud in German:</div>
            <div style="font-size:22px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:8px">
              <span>${item.de}</span>
              ${speakBtn(item.de, {size:'lg'})}
            </div>
            <div class="muted" style="font-size:12px;font-style:italic">${item.en}</div>
          </div>

          ${!STATE.speakGrade ? `
            <button class="btn btn-dark" id="record-speak" style="margin-top:12px;padding:16px">
              ${STATE.listening ? '🎙️ Listening...' : '🎤 Tap to speak'}
            </button>
            <div class="muted" style="font-size:11px;text-align:center;margin-top:6px">Tap, then say the sentence aloud.</div>
          ` : `
            <div class="grade-box ${STATE.speakGrade.grade==='correct'?'grade-ok':STATE.speakGrade.grade==='almost'?'grade-cl':'grade-no'}" style="margin-top:12px">
              <div class="grade-label">
                ${STATE.speakGrade.grade==='correct'?`✓ Verstanden! (${Math.round(STATE.speakGrade.score*100)}% match)`:STATE.speakGrade.grade==='almost'?`~ Close (${Math.round(STATE.speakGrade.score*100)}% match)`:`✗ Try again (${Math.round(STATE.speakGrade.score*100)}% match)`}
              </div>
              <div style="margin-top:4px;font-size:13px"><strong>I heard:</strong> "${STATE.speakGrade.heard}"</div>
              <div style="margin-top:4px;font-size:13px"><strong>Target:</strong> "${STATE.speakGrade.target}" ${speakBtn(STATE.speakGrade.target, {size:'md'})}</div>
            </div>
            <div style="display:flex;gap:6px;margin-top:10px">
              <button class="btn" id="retry-speak" style="flex:1">🔁 Try again</button>
              <button class="btn btn-dark" id="next-speak" style="flex:1">
                ${STATE.speakIdx + 1 >= total ? 'Finish →' : 'Next →'}
              </button>
            </div>
          `}
        </div>
      `}
    </div>`;

    document.getElementById('back')?.addEventListener('click', () => { STATE.phase = 'lesson'; render(); });
    document.getElementById('skip-speak')?.addEventListener('click', () => nextPhase());
    document.getElementById('record-speak')?.addEventListener('click', startSpeakAttempt);
    document.getElementById('retry-speak')?.addEventListener('click', () => { STATE.speakGrade = null; STATE.speakHeard = ''; render(); });
    document.getElementById('next-speak')?.addEventListener('click', nextSpeakItem);
  }

  else if (view === 'lesson' && phase === 'conv') {
    app.innerHTML = `<div class="chat-wrap fade">
      <div class="hdr">
        <div style="width:30px;height:30px;border-radius:50%;background:var(--success-bg);display:flex;align-items:center;justify-content:center;font-size:14px">🤖</div>
        <div style="flex:1"><div class="t3">Max — Conversation</div><div style="font-size:11px;color:var(--success)">● ${lesson.title}</div></div>
        <button class="btn btn-sm btn-dark" id="conv-done">Done ✓</button>
      </div>
      <div id="chat" class="chat-msgs">
        ${STATE.msgs.length === 0 && STATE.convLoading ? `<div class="loader"><div>Max is getting ready...</div></div>` : ''}
        ${STATE.msgs.map(m => {
          const isU = m.role === 'user';
          const parts = m.content.split('📝 Correction:');
          const main = parts[0].trim();
          const corr = parts[1]?.trim();
          return isU
            ? `<div style="display:flex;justify-content:flex-end"><div class="bubble-user">${main}</div></div>`
            : `<div>
                <div class="bubble-ai">${main.replace(/\n/g,'<br>')}</div>
                ${corr ? `<div class="corr">📝 ${corr}</div>` : ''}
                <button class="tts-btn" data-sp="${main.slice(0,280).replace(/"/g,"'")}">🔈 hear it</button>
              </div>`;
        }).join('')}
        ${STATE.convLoading && STATE.msgs.length > 0 ? `<div><div class="bubble-ai"><div class="typing"><div class="tydot" style="animation-delay:0s"></div><div class="tydot" style="animation-delay:.2s"></div><div class="tydot" style="animation-delay:.4s"></div></div></div></div>` : ''}
        <div id="chat-end"></div>
      </div>
      <div class="chat-input-area" style="flex-direction:column;align-items:stretch;gap:4px">
        <div style="display:flex;gap:6px;align-items:center">
          ${STATE.voiceOk ? `<button class="mic-btn${STATE.listening?' on':''}" id="mic-conv">🎤</button>` : ''}
          <input id="conv-in" placeholder="Antworten Sie auf Deutsch..." value="${STATE.convInput.replace(/"/g,'&quot;')}" style="flex:1">
          <button class="btn btn-dark btn-sm" id="send-conv" style="width:auto" ${!STATE.convInput.trim()||STATE.convLoading?'disabled':''}>→</button>
        </div>
        ${umlauts()}
      </div>
    </div>`;

    document.getElementById('conv-done')?.addEventListener('click', nextPhase);
    document.querySelectorAll('[data-sp]').forEach(b => b.addEventListener('click', () => speak(b.dataset.sp)));
    const ci = document.getElementById('conv-in');
    if (ci) {
      STATE.lastInput = ci;
      ci.addEventListener('input', e => {
        STATE.convInput = e.target.value;
        document.getElementById('send-conv').disabled = !e.target.value.trim() || STATE.convLoading;
      });
      ci.addEventListener('keydown', e => { if (e.key === 'Enter') sendConv(); });
    }
    document.getElementById('send-conv')?.addEventListener('click', sendConv);
    document.getElementById('mic-conv')?.addEventListener('click', () => startListen(t => {
      const i = document.getElementById('conv-in'); if (i) { i.value = STATE.convInput + t; STATE.convInput = i.value; }
    }));
    document.getElementById('chat-end')?.scrollIntoView({behavior:'smooth'});
  }

  // ── RAPID FIRE ───────────────────────────────────────────────────────────────
  else if (view === 'lesson' && phase === 'rapidFire') {
    const q = STATE.rfQuestions[STATE.rfIdx];
    const total = STATE.rfQuestions.length;
    const m = Math.floor(STATE.rfTimeLeft / 60);
    const s = STATE.rfTimeLeft % 60;
    const timePct = (STATE.rfTimeLeft / RAPID_FIRE_TIME) * 100;

    app.innerHTML = `<div class="scroll fade">
      <div class="hdr">
        <button class="back" id="back">←</button>
        <div style="flex:1"><div class="t2">⚡ Rapid Fire</div><div class="muted">${lesson.title}</div></div>
        <span class="t2 rf-time">${m}:${s.toString().padStart(2,'0')}</span>
      </div>
      <div class="rf-timer"><div class="rf-fill${timePct < 20?' urgent':''}" style="width:${timePct}%"></div></div>
      <div class="ex-dots">
        ${Array.from({length:total}).map((_,i) => {
          const cls = i < STATE.rfAnswers.length ? (STATE.rfAnswers[i].correct ? 'done' : 'fail') : i === STATE.rfIdx ? 'active' : 'todo';
          return `<div class="ex-dot ${cls}"></div>`;
        }).join('')}
      </div>
      <div style="padding:8px 16px">
        ${STATE.rfLoading ? `<div class="loader"><div class="loader-icon">⚙️</div><div>Preparing rapid fire...</div></div>` : q ? `
          <div class="card" style="margin:0 0 10px">
            <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">Q${STATE.rfIdx+1} of ${total}</div>
            <div style="font-size:17px;font-weight:700;line-height:1.4">${q.question}</div>
          </div>
          ${q.options?.length ? `
            <div>
              ${q.options.map((opt,i) => `<button class="mc-opt rf-mc" data-i="${i}">${['A','B','C','D'][i]}. ${opt}</button>`).join('')}
            </div>
          ` : `
            <input id="rf-ans" placeholder="Answer in German..." value="${STATE.rfAnswer}" autocomplete="off" autocorrect="off" autocapitalize="off">
            ${umlauts()}
            <div class="row" style="margin-top:6px">
              ${STATE.voiceOk ? `<button class="mic-btn${STATE.listening?' on':''}" id="rf-mic">🎤</button>` : ''}
              <button class="btn btn-dark" id="rf-submit" ${!STATE.rfAnswer.trim()?'disabled':''} style="flex:1;text-align:center">Submit →</button>
            </div>
          `}
        ` : ''}
      </div>
    </div>`;

    document.getElementById('back')?.addEventListener('click', () => {
      if (confirm('Leave Rapid Fire? Your progress will be lost.')) {
        clearInterval(STATE.rfTimer); STATE.phase = 'conv'; render();
      }
    });

    const rfAns = document.getElementById('rf-ans');
    if (rfAns) {
      STATE.lastInput = rfAns;
      rfAns.addEventListener('input', e => STATE.rfAnswer = e.target.value);
      rfAns.addEventListener('keydown', e => { if (e.key === 'Enter') submitRF(); });
    }
    document.getElementById('rf-submit')?.addEventListener('click', submitRF);
    document.getElementById('rf-mic')?.addEventListener('click', () => startListen(t => {
      STATE.rfAnswer += t;
      const a = document.getElementById('rf-ans'); if (a) a.value = STATE.rfAnswer;
    }));
    document.querySelectorAll('.rf-mc').forEach(btn => btn.addEventListener('click', () => {
      const q = STATE.rfQuestions[STATE.rfIdx];
      const letter = ['A','B','C','D'][parseInt(btn.dataset.i)];
      const correct = letter === q.answer;
      rfSubmitAnswer(correct);
    }));
  }

  // ── RAPID FIRE RESULT ──────────────────────────────────────────────────────
  else if (view === 'lesson' && phase === 'rfResult') {
    const { correct, total, passed: rfPassed, timeUp } = STATE.rfResult || {};
    const pct = Math.round((correct/total)*100);

    app.innerHTML = `<div class="rf-result fade">
      <div class="big-emoji">${rfPassed ? '⚡' : '😤'}</div>
      <div class="t1" style="margin:8px 0">${rfPassed ? 'Rapid Fire Cleared!' : 'Rapid Fire Failed'}</div>
      ${timeUp ? '<div class="muted">Time ran out</div>' : ''}
      <div class="rf-score" style="margin:12px 0;color:${rfPassed?'var(--success)':'var(--danger)'}">${correct}/${total} <span style="font-size:14px">(${pct}%)</span></div>
      ${rfPassed ? `
        <div class="card-success" style="margin:0 0 16px">✓ Lesson complete! No debt recorded.</div>
      ` : `
        <div class="card-danger" style="margin:0 0 16px">
          ⚡ Rapid Fire debt recorded. You can proceed to the next lesson, but will be blocked 2 lessons ahead until you clear this.
        </div>
      `}
      <button class="btn btn-dark" id="rf-home">Back to Home</button>
      ${!rfPassed ? `<button class="btn" id="rf-retry" style="margin-top:8px">Retry Rapid Fire</button>` : ''}
    </div>`;

    document.getElementById('rf-home')?.addEventListener('click', finishSession);
    document.getElementById('rf-retry')?.addEventListener('click', () => startPhase('rapidFire'));
  }

  // ── COMPLETE ─────────────────────────────────────────────────────────────────
  else if (view === 'complete') {
    const done = STATE.prog.completed || [];
    const total = CURRICULUM.filter(l => !l.isPhrases && !l.isExam).length;
    app.innerHTML = `<div class="complete-screen">
      <div class="big-emoji">🎉</div>
      <div class="t1">Ausgezeichnet!</div>
      <div class="muted">"${lesson?.title || ''}" — session complete</div>
      <div class="stat-row">
        <div class="stat"><div class="stat-n" style="color:#d97706">${STATE.prog.streak||0}</div><div class="stat-l">streak 🔥</div></div>
        <div class="stat"><div class="stat-n">${done.length}</div><div class="stat-l">done</div></div>
        <div class="stat"><div class="stat-n">${Math.round((done.length/total)*100)}%</div><div class="stat-l">to A2</div></div>
      </div>
      <button class="btn btn-dark" id="home-btn" style="max-width:240px">Back to Home →</button>
    </div>`;

    document.getElementById('home-btn')?.addEventListener('click', () => { STATE.view = 'home'; STATE.lesson = null; render(); });
  }
}

// ─── RF SUBMIT ────────────────────────────────────────────────────────────────
function rfSubmitAnswer(correct) {
  const q = STATE.rfQuestions[STATE.rfIdx];
  recordExerciseResult(q?.corpusId, correct);
  STATE.rfAnswers.push({ correct });
  if (STATE.rfIdx + 1 >= STATE.rfQuestions.length) {
    finishRapidFire();
  } else {
    STATE.rfIdx++; STATE.rfAnswer = ''; render();
  }
}

async function submitRF() {
  if (!STATE.rfAnswer.trim()) return;
  const q = STATE.rfQuestions[STATE.rfIdx];
  // Quick grade — don't use API for RF (too slow) — just fuzzy string match
  const given = STATE.rfAnswer.trim().toLowerCase();
  const expected = q.answer.toLowerCase();
  const correct = given === expected ||
    given.includes(expected.slice(0, Math.max(3, expected.length - 2))) ||
    expected.includes(given.slice(0, Math.max(3, given.length - 2)));
  rfSubmitAnswer(correct);
}

// ─── OPEN LESSON ──────────────────────────────────────────────────────────────
async function openLesson(lesson) {
  // Exam lessons redirect to the new exam engine
  if (lesson.isExam || lesson.level === 'exam') {
    // Map to the matching template: A2 full exam by default
    const key = lesson.id === 34 ? 'a2-full' : lesson.level === 'a11' ? 'a1-checkpoint' : lesson.level === 'a12' ? 'a1-full' : 'a2-full';
    startExam(key);
    return;
  }
  STATE.view = 'lesson';
  STATE.lesson = lesson;
  STATE.phase = 'lesson';
  STATE.generatedLesson = null;
  render();

  // If lesson needs AI generation
  if (lesson.aiOutline && !lesson.sections && !lesson.isPhrases) {
    const cached = STATE.lessonCache[lesson.id];
    if (cached) {
      STATE.generatedLesson = cached;
    } else {
      STATE.generatedLesson = null; // show loading
      render();
      STATE.generatedLesson = await generateLesson(lesson);
    }
    render();
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.insertUmlaut = insertUmlaut;

// One-time backfill: populate vocab vault from lessons the user already completed
// before the vault feature existed. Runs once per user (idempotent anyway, but we
// skip after the first pass to keep init fast).
function backfillVocabVault() {
  const BACKFILL_KEY = 'dt-vocab-backfill-v1';
  if (localStorage.getItem(BACKFILL_KEY)) return;
  const completedIds = STATE.prog.completed || [];
  let totalAdded = 0;
  completedIds.forEach(id => {
    const lesson = CURRICULUM.find(l => l.id == id); // loose == handles string/number ids
    if (lesson) totalAdded += (addLessonVocab(lesson) || 0);
  });
  localStorage.setItem(BACKFILL_KEY, String(Date.now()));
  if (totalAdded > 0) console.log(`Vocab vault backfilled with ${totalAdded} words from ${completedIds.length} completed lessons`);
}

async function init() {
  applyPrefs(STATE.prefs || {});
  initVoice();
  // curriculum-data.js loaded via script tag before this module —
  // CURRICULUM is already set. Just render.
  if (!CURRICULUM.length) {
    console.error('Curriculum empty — check curriculum-data.js script tag');
  }
  backfillVocabVault();

  // Global delegated click handler for [data-speak] buttons — makes 🔊 icons work anywhere.
  document.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-speak]');
    if (!btn) return;
    e.preventDefault();
    e.stopPropagation();
    speak(btn.dataset.speak);
  });

  render();
}

init();
</script>
