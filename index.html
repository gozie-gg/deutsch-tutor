<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Deutsch Tutor A1→A2</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇩🇪</text></svg>">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1a1a;--paper:#fff;--surface:#f8f7f4;--border:#e5e5e0;--border-hover:#ccc;
  --muted:#888;--success:#2e7d32;--success-bg:#e8f5e9;--success-border:#a5d6a7;
  --warn:#b45309;--warn-bg:#fff8e1;--warn-border:#fcd34d;
  --danger:#be123c;--danger-bg:#fce4ec;--danger-border:#f9a8d4;
  --info:#1e40af;--info-bg:#eff6ff;--info-border:#93c5fd;
  --accent:#1a1a1a;--radius:10px;--radius-lg:14px;
  --scale:1;
}
[data-theme="dark"]{
  --ink:#ededed;--paper:#16181c;--surface:#0f1115;--border:#2b2f36;--border-hover:#4a4f58;
  --muted:#8a9099;--success:#86efac;--success-bg:#0d2a17;--success-border:#16351e;
  --warn:#fbbf24;--warn-bg:#2a1f07;--warn-border:#3b2c0e;
  --danger:#fca5a5;--danger-bg:#2b0f15;--danger-border:#3a141c;
  --info:#93c5fd;--info-bg:#0d1e33;--info-border:#13294b;
  --accent:#ededed;
}
[data-theme="dark"] .speak-btn{filter:brightness(1.15)}
/* Keep the pastel-gradient accent cards legible in dark mode by forcing dark text */
[data-theme="dark"] .card[style*="gradient"]{color:#111}
[data-theme="dark"] .card[style*="gradient"] .muted{color:#555 !important}
[data-theme="dark"] .card[style*="gradient"] .t2,[data-theme="dark"] .card[style*="gradient"] .t3{color:#111}
html{font-size:calc(16px * var(--scale))}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--surface);color:var(--ink);min-height:100vh;-webkit-tap-highlight-color:transparent}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--paper);box-shadow:0 0 0 1px var(--border)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes countdown{from{width:100%}to{width:0%}}
.fade{animation:fadeUp .25s ease both}
.spin{animation:spin 1s linear infinite;display:inline-block}

/* ─── LAYOUT ─── */
.hdr{padding:13px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:var(--paper);position:sticky;top:0;z-index:20}
.scroll{padding-bottom:80px}
.section-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.9px;padding:10px 16px 5px}

/* ─── EXAM TIMER ─── */
.exam-timer{font-variant-numeric:tabular-nums;font-weight:700;font-size:16px;padding:4px 10px;background:var(--surface);border-radius:8px;color:var(--ink);border:1px solid var(--border)}
.exam-timer.urgent{background:#fee2e2;color:#b91c1c;border-color:#fca5a5;animation:pulse 1s infinite}

/* ─── BOTTOM TAB NAV ─── */
.tabnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--paper);border-top:1px solid var(--border);display:flex;z-index:30;padding:6px 0 10px;box-shadow:0 -4px 12px rgba(0,0,0,.04)}
[data-theme="dark"] .tabnav{box-shadow:0 -4px 12px rgba(0,0,0,.3)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:transparent;border:none;padding:8px 4px;cursor:pointer;color:var(--muted);font-family:inherit;font-size:10px;font-weight:600;transition:color .15s}
.tab-btn.active{color:var(--ink)}
.tab-btn:hover{color:var(--ink)}
.tab-ico{font-size:20px;line-height:1;filter:grayscale(.4)}
.tab-btn.active .tab-ico{filter:grayscale(0)}

/* ─── EXERCISE PROGRESS DOTS ─── */
.qdots{display:flex;gap:3px;padding:8px 16px;flex-wrap:wrap;justify-content:center}
.qdot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .2s}
.qdot.ok{background:var(--success);transform:scale(1.1)}
.qdot.bad{background:#ef4444;transform:scale(1.1)}
.qdot.now{background:var(--ink);box-shadow:0 0 0 3px rgba(0,0,0,.1);transform:scale(1.25)}

/* ─── TOGGLE SWITCH ─── */
.toggle{position:relative;display:inline-block;width:44px;height:24px}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--border);border-radius:24px;transition:.2s}
.toggle-slider:before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:var(--paper);border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle input:checked + .toggle-slider{background:#10b981}
.toggle input:checked + .toggle-slider:before{transform:translateX(20px)}

/* ─── SEGMENTED SELECT ─── */
.segmented{display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;width:fit-content}
.segmented button{background:var(--paper);border:none;padding:6px 12px;font-size:12px;cursor:pointer;color:var(--muted);font-family:inherit;font-weight:600}
.segmented button.active{background:var(--ink);color:var(--paper)}
.segmented button:not(:last-child){border-right:1px solid var(--border)}

/* ─── TYPOGRAPHY ─── */
.t1{font-size:18px;font-weight:700;letter-spacing:-.3px}
.t2{font-size:14px;font-weight:600}
.t3{font-size:13px;font-weight:600}
.body{font-size:13px;line-height:1.75;color:var(--ink)}
.muted{font-size:12px;color:var(--muted)}
.em{color:var(--muted);font-style:italic}

/* ─── CARDS ─── */
.card{background:var(--paper);border:1px solid var(--border);border-radius:var(--radius-lg);padding:15px;margin:10px 16px}
.card-flat{background:var(--surface);border-radius:var(--radius-lg);padding:15px;margin:8px 16px}
.card-success{background:var(--success-bg);border:1px solid var(--success-border);border-radius:var(--radius);padding:12px 14px;margin:8px 0}
.card-warn{background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--radius);padding:12px 14px;margin:8px 0}
.card-danger{background:var(--danger-bg);border:1px solid var(--danger-border);border-radius:var(--radius);padding:12px 14px;margin:8px 0}
.card-info{background:var(--info-bg);border:1px solid var(--info-border);border-radius:var(--radius);padding:12px 14px;margin:8px 0}

/* ─── BUTTONS ─── */
.btn{display:block;width:100%;background:var(--paper);border:1px solid var(--border-hover);border-radius:var(--radius);padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink);font-family:inherit;transition:background .1s;text-align:center;-webkit-appearance:none}
.btn:hover{background:var(--surface)}
.btn:active{transform:scale(.99)}
.btn:disabled{opacity:.35;cursor:default;transform:none}
.btn-dark{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.btn-dark:hover{background:#333;border-color:#333}
.btn-success{background:var(--success-bg);color:var(--success);border-color:var(--success-border)}
.btn-correct{background:var(--success-bg);color:var(--success);border-color:var(--success-border);opacity:1 !important}
.btn-wrong{background:#ffe5e5;color:#b91c1c;border-color:#fca5a5;opacity:1 !important}
.btn-warn{background:var(--warn-bg);color:var(--warn);border-color:var(--warn-border)}
.btn-sm{padding:8px 13px;font-size:12px;width:auto;display:inline-block}
.btn-icon{background:none;border:none;cursor:pointer;font-size:16px;padding:4px;color:var(--muted)}
.btn-icon:hover{color:var(--ink)}
.back{background:none;border:none;cursor:pointer;font-size:20px;padding:0;color:var(--muted);font-family:inherit;line-height:1}
.back:hover{color:var(--ink)}

/* ─── TAGS / BADGES ─── */
.tag{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.3px}
.tag-foundation{background:#ede9fe;color:#6d28d9}
.tag-phrases{background:#e0f2fe;color:#0369a1}
.tag-a11{background:#dcfce7;color:#166534}
.tag-a12{background:#fef3c7;color:#92400e}
.tag-a2{background:#fce7f3;color:#9d174d}
.tag-exam{background:#f3e8ff;color:#7c3aed}

.dbadge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px}
.d-e{background:#dcfce7;color:#166534}
.d-m{background:#fef3c7;color:#92400e}
.d-h{background:#fce7f3;color:#9d174d}
.d-x{background:#f0f0ec;color:#555}
.d-rf{background:var(--ink);color:var(--paper)}

/* ─── PROGRESS ─── */
.pbar{background:var(--surface);border-radius:4px;height:4px;overflow:hidden;margin:5px 0}
.pfill{height:100%;border-radius:4px;background:var(--ink);transition:width .5s}
.ex-dots{display:flex;gap:3px;padding:8px 16px 0}
.ex-dot{flex:1;height:4px;border-radius:3px;background:var(--border);transition:all .25s}
.ex-dot.done{background:var(--success);transform:scaleY(1.3)}
.ex-dot.active{background:var(--ink);transform:scaleY(1.5);box-shadow:0 0 0 1px var(--ink)}
.ex-dot.fail{background:#ef4444;transform:scaleY(1.3)}
.ex-dot.todo{background:var(--border);opacity:.5}
.ex-dot.todo{background:var(--border)}

/* ─── INPUTS ─── */
input,textarea{background:var(--surface);border:1px solid var(--border-hover);border-radius:var(--radius);padding:11px 13px;font-size:13px;color:var(--ink);font-family:inherit;width:100%;outline:none;transition:border-color .15s;-webkit-appearance:none}
input:focus,textarea:focus{border-color:var(--ink);background:var(--paper)}
textarea{resize:none;min-height:78px}
.row{display:flex;gap:8px;align-items:stretch}
.mic-btn{background:var(--paper);border:1px solid var(--border-hover);border-radius:var(--radius);padding:12px 14px;cursor:pointer;font-size:16px;flex-shrink:0;transition:background .1s;-webkit-appearance:none}
.mic-btn:hover{background:var(--surface)}
.mic-btn.on{background:var(--danger-bg);border-color:var(--danger-border)}

/* ─── UMLAUT TOOLBAR ─── */
.umlaut-bar{display:flex;gap:5px;padding:6px 4px 10px;flex-wrap:wrap;background:linear-gradient(180deg,var(--surface),transparent);border-radius:0 0 8px 8px;margin-top:-2px;border:1px solid var(--border);border-top:none;justify-content:center}
.umlaut-btn{background:var(--paper);border:1px solid var(--border-hover);border-radius:6px;padding:6px 12px;font-size:15px;font-weight:700;cursor:pointer;color:var(--ink);font-family:inherit;min-width:40px;text-align:center;transition:background .1s;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.umlaut-btn:hover{background:#e8e8e4;border-color:var(--muted)}
.umlaut-btn:active{transform:scale(.95);background:#d9d9d4}

/* ─── LESSON CONTENT ─── */
.lesson-h{font-size:13px;font-weight:700;margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border);color:var(--ink)}
.lesson-body{font-size:13px;line-height:1.8;white-space:pre-line;color:var(--ink)}
.vocab-row{display:flex;align-items:baseline;gap:8px;padding:5px 0;border-bottom:1px solid #f2f2ee}
.vocab-row:last-child{border:none}
.vocab-de{font-weight:700;min-width:46%;font-size:12px}
.vocab-en{color:var(--muted);font-size:12px}
.ex-row{padding:5px 0 5px 12px;border-left:2px solid var(--border);margin:3px 0}
.ex-de{font-size:13px;font-weight:600}
.ex-en{font-size:11px;color:var(--muted);font-style:italic;margin-top:2px}
.phrase-row{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start}
.phrase-row:last-child{border:none}
.phrase-de{font-size:13px;font-weight:600;flex:1}
.phrase-en{font-size:12px;color:var(--muted);flex:1}
.tip-box{background:#fffbeb;border:1px solid #fde68a;border-radius:var(--radius);padding:12px 14px;margin:8px 0;font-size:12px;line-height:1.6}
.mistake-box{background:#fef2f2;border:1px solid #fca5a5;border-radius:var(--radius);padding:12px 14px;margin:6px 0;font-size:12px;line-height:1.6}
.summary-item{padding:5px 0 5px 16px;border-left:3px solid var(--ink);margin:4px 0;font-size:13px;line-height:1.55}

/* ─── FILL IN GAPS ─── */
.gap-sentence{font-size:15px;font-weight:600;line-height:1.5;margin-bottom:8px}
.gap-hint{font-size:11px;color:var(--muted);margin-bottom:6px}
.gap-revealed{background:var(--success-bg);border:1px solid var(--success-border);border-radius:6px;padding:8px 12px;font-size:13px;font-weight:700;color:var(--success);margin-top:6px}
.gap-wrong-hint{background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:6px;padding:8px 12px;font-size:13px;margin-top:6px;color:var(--warn)}

/* ─── EXERCISE GRADING ─── */
.grade-box{border-radius:var(--radius);padding:12px 14px;font-size:13px;animation:fadeUp .2s ease;margin:8px 0}
.grade-ok{background:var(--success-bg);border:1px solid var(--success-border);color:var(--success)}
.grade-cl{background:var(--warn-bg);border:1px solid var(--warn-border);color:var(--warn)}
.grade-no{background:var(--danger-bg);border:1px solid var(--danger-border);color:var(--danger)}
.grade-label{font-weight:700;margin-bottom:4px;font-size:14px}
.grade-correction{font-weight:700;margin-top:6px;font-size:13px}

/* ─── MULTIPLE CHOICE ─── */
.mc-opt{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 14px;font-size:13px;cursor:pointer;transition:background .1s;margin-bottom:6px;width:100%;text-align:left;font-family:inherit;color:var(--ink);-webkit-appearance:none}
.mc-opt:hover{background:#f0f0ec;border-color:var(--border-hover)}
.mc-ok{background:var(--success-bg)!important;border-color:var(--success-border)!important;color:var(--success)!important;font-weight:600}
.mc-no{background:var(--danger-bg)!important;border-color:var(--danger-border)!important;color:var(--danger)!important}

/* ─── RAPID FIRE ─── */
.rf-timer{height:5px;background:var(--surface);border-radius:3px;overflow:hidden;margin:0 16px 8px}
.rf-fill{height:100%;background:var(--success);transition:width .5s linear}
.rf-fill.urgent{background:var(--danger)}
.rf-score{font-size:26px;font-weight:700;text-align:center}
.rf-result{text-align:center;padding:30px 20px}

/* ─── CONVERSATION ─── */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 62px);max-height:680px}
.chat-msgs{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.bubble-ai{background:var(--surface);border:1px solid var(--border);border-radius:13px 13px 13px 3px;padding:11px 14px;font-size:13px;line-height:1.65;max-width:86%;align-self:flex-start;animation:fadeUp .2s ease}
.bubble-user{background:var(--ink);color:var(--paper);border-radius:13px 13px 3px 13px;padding:11px 14px;font-size:13px;line-height:1.65;max-width:86%;align-self:flex-end;animation:fadeUp .2s ease}
.corr{background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:0 0 8px 8px;padding:7px 12px;font-size:11px;color:var(--warn);max-width:86%;align-self:flex-start;margin-top:-5px}
.tts-btn{background:none;border:none;cursor:pointer;font-size:11px;color:var(--muted);padding:2px 0;font-family:inherit}
.tts-btn:hover{color:var(--ink)}
.typing{display:flex;gap:4px;padding:4px 0;align-items:center}
.tydot{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:blink 1.2s ease-in-out infinite}
.chat-input-area{padding:10px 16px;border-top:1px solid var(--border);background:var(--paper);display:flex;gap:8px;flex-shrink:0}

/* ─── HOME SCREEN ─── */
.topic-item{display:flex;align-items:flex-start;gap:11px;padding:12px 16px;border-bottom:1px solid #f2f2ee;cursor:pointer;transition:background .1s;-webkit-tap-highlight-color:transparent}
.topic-item:hover{background:#fafaf8}
.topic-item.locked{opacity:.35;cursor:default}
.topic-item.locked:hover{background:transparent}
.topic-num{width:30px;height:30px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px;border:1px solid var(--border)}
.topic-num.done{background:var(--success-bg);color:var(--success);border-color:var(--success-border)}
.topic-num.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.topic-num.debt{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-border)}
.debt-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;color:var(--danger);background:var(--danger-bg);border:1px solid var(--danger-border);border-radius:12px;padding:2px 7px;margin-left:6px}

/* ─── LOADING ─── */
.loader{text-align:center;padding:40px 20px;color:var(--muted)}
.loader-icon{font-size:24px;animation:spin 1s linear infinite;display:inline-block;margin-bottom:10px}
.provider-tag{font-size:10px;color:var(--muted);text-align:right;padding:2px 16px;margin-top:-4px}

/* ─── COMPLETE SCREEN ─── */
.complete-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 24px;text-align:center;gap:12px;min-height:500px;animation:fadeUp .3s ease}
.big-emoji{font-size:52px}
.stat-row{display:flex;gap:24px;margin:10px 0}
.stat{text-align:center}
.stat-n{font-size:28px;font-weight:700}
.stat-l{font-size:11px;color:var(--muted);margin-top:2px}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-hover);border-radius:3px}
</style>
</head>
<body>
<div id="app" class="app"></div>
<!-- Curriculum data loads first so window.CURRICULUM_DATA is set before module executes -->
<script src="/curriculum-data.js"></script>
<script type="module">
// ─── CURRICULUM IMPORT ───────────────────────────────────────────────────────
// Inline the curriculum for deployment (Vercel doesn't support ES module imports in plain HTML)
// Full curriculum data inlined below

const EXERCISE_COUNTS = { easy:10, medium:20, hard:30, extraHard:40, rapidFire:30, listen:5, speak:5 };
const PASS_THRESHOLD = 0.8;
const RAPID_FIRE_TIME = 15 * 60;
const DEBT_BLOCK_DISTANCE = 2;

// ─── CURRICULUM (condensed from curriculum.js for inline use) ─────────────────
// curriculum-data.js is loaded via <script> tag before this module, so
// window.CURRICULUM_DATA is guaranteed to be set when we get here.
let CURRICULUM = window.CURRICULUM_DATA || [];

async function loadCurriculum() {
  // Already loaded synchronously via script tag — nothing to do
  if (CURRICULUM.length) return;
  // Last-resort safety fetch (should never be needed in normal deployment)
  try {
    const r = await fetch('/curriculum-data.js');
    if (r.ok) console.warn('curriculum-data.js fetched via fallback — check script tag order');
  } catch(e) {
    console.error('Curriculum failed to load:', e);
  }
}

// ─── STATE ────────────────────────────────────────────────────────────────────
const PROG_KEY = 'dt-v3';
function loadProg() {
  try { return JSON.parse(localStorage.getItem(PROG_KEY) || '{}'); }
  catch { return {}; }
}
function saveProg(p) { localStorage.setItem(PROG_KEY, JSON.stringify(p)); }

const LESSON_CACHE_KEY = 'dt-lessons-v3';
function loadLessonCache() {
  try { return JSON.parse(localStorage.getItem(LESSON_CACHE_KEY) || '{}'); }
  catch { return {}; }
}
function saveLessonCache(cache) { localStorage.setItem(LESSON_CACHE_KEY, JSON.stringify(cache)); }

// ─── LEARNED VOCAB STORAGE ───────────────────────────────────────────────────
const VOCAB_KEY = 'dt-vocab-v1';
function loadLearnedVocab() {
  try { return JSON.parse(localStorage.getItem(VOCAB_KEY) || '{}'); }
  catch { return {}; }
}
function saveLearnedVocab(v) { localStorage.setItem(VOCAB_KEY, JSON.stringify(v)); }

function addLessonVocab(lesson) {
  if (!lesson?.vocab?.length) return 0;
  const v = STATE.learnedVocab || {};
  let added = 0;
  lesson.vocab.forEach(entry => {
    const [de, en] = Array.isArray(entry) ? entry : [entry, ''];
    if (!de || !en) return;
    if (!v[de]) {
      v[de] = {
        en, lessonId: lesson.id, lessonTitle: lesson.title, seenAt: Date.now(),
        // SRS fields (SM-2 lite)
        ease: 2.5,       // ease factor — grows with good recall
        interval: 0,     // days until next review (0 = new, due immediately)
        due: Date.now(), // timestamp — when this word next needs review
        reviews: 0,      // total times reviewed
        lapses: 0,       // times forgotten
        mnemonic: null,  // cached AI-generated mnemonic
      };
      added++;
    }
  });
  STATE.learnedVocab = v;
  saveLearnedVocab(v);
  return added;
}

// ─── MOCK EXAMS (Goethe-format simulators) ───────────────────────────────────
// Each template defines the sections, item counts, and time limits. The engine

// Generate items for one exam section. Returns an array of question objects shaped per type.
async function generateExamSection(examLevel, section) {
  const levelGuide = LEVEL_GUIDE[examLevel] || LEVEL_GUIDE.a11;
  const levelLabel = examLevel === 'a11' ? 'A1.1' : examLevel === 'a12' ? 'A1 (late A1)' : examLevel === 'a2' ? 'A2' : examLevel;

  let systemPrompt, userPrompt, fallback;

  if (section.type === 'mixed' || section.type === 'listening') {
    // Both produce MC items; listening ones will be spoken via TTS
    systemPrompt = `You generate German exam questions for a ${levelLabel} CEFR level mock test. Return ONLY a valid JSON array. No markdown, no prose.
Each object: {"question": "...", "options": ["A option","B option","C option","D option"], "answer": "A"|"B"|"C"|"D", "audio": "German sentence to read aloud (only for listening items, else empty string)"}
For ${section.type === 'listening' ? 'LISTENING: the "audio" field is a short German sentence (5-12 words) that will be read aloud by TTS. The "question" is a COMPREHENSION question in English about the audio. Options are 4 English answer choices.' : 'MIXED REVIEW: standard multiple-choice grammar/vocab questions. Leave "audio" empty. Questions can mix grammar, translation, and vocabulary recognition.'}`;
    userPrompt = `Generate ${section.count} ${section.type === 'listening' ? 'listening comprehension' : 'mixed review'} items for a ${levelLabel} mock exam.

LEVEL CEILING — obey strictly:
${levelGuide}

Generate them now.`;
    fallback = Array.from({ length: section.count }).map((_, i) => ({
      question: `Sample ${section.type} question ${i + 1}`,
      options: ['A', 'B', 'C', 'D'],
      answer: 'A',
      audio: section.type === 'listening' ? 'Guten Tag. Wie heißen Sie?' : ''
    }));
  } else if (section.type === 'reading') {
    systemPrompt = `You generate German READING COMPREHENSION items for a ${levelLabel} mock exam. Return ONLY a valid JSON array. No markdown.
Each object: {"text": "short German passage (30-60 words for A1, 50-100 for A2) — a notice, ad, email, or message", "question": "English comprehension question", "options": ["A option","B option","C option","D option"], "answer": "A"|"B"|"C"|"D"}
The text should be realistic: classifieds, SMS, e-mails, public notices.`;
    userPrompt = `Generate ${section.count} reading comprehension items for ${levelLabel}.

LEVEL CEILING:
${levelGuide}

Generate them now.`;
    fallback = Array.from({ length: section.count }).map((_, i) => ({
      text: 'Hallo! Ich heiße Anna. Ich komme aus Deutschland und lerne Englisch.',
      question: `What is the person's name?`,
      options: ['Anna', 'Maria', 'Sofia', 'Lena'],
      answer: 'A'
    }));
  } else if (section.type === 'writing') {
    systemPrompt = `You generate German WRITING prompts for a ${levelLabel} mock exam. Return ONLY a valid JSON array. No markdown.
Each object: {"task": "what to write (in English, ~1 sentence)", "context": "realistic scenario in English", "minWords": 20|30|40|50, "pointsToInclude": ["point 1", "point 2", "point 3"]}
Tasks should mimic Goethe format: short message to a friend/colleague, filling information, email, etc.`;
    userPrompt = `Generate ${section.count} writing prompts for ${levelLabel}.

LEVEL CEILING:
${levelGuide}

Generate them now.`;
    fallback = [
      { task: 'Write a short message to a German friend', context: 'Your friend invited you to dinner. Write a reply.', minWords: 30, pointsToInclude: ['Accept or decline', 'Suggest a time', 'Ask what to bring'] },
      { task: 'Write a message to your landlord', context: 'Your heater is broken. Write to report it.', minWords: 30, pointsToInclude: ['Describe the problem', 'Ask for repair', 'Give your availability'] }
    ].slice(0, section.count);
  } else if (section.type === 'speaking') {
    systemPrompt = `You generate German SPEAKING tasks for a ${levelLabel} mock exam. Return ONLY a valid JSON array. No markdown.
Each object: {"task": "what to say (in English)", "example": "example German sentence the student might say", "pointsToInclude": ["point 1", "point 2"]}
Goethe A1 Sprechen has 3 parts: (1) self-introduction, (2) ask and answer questions, (3) make a request. Match that spirit.`;
    userPrompt = `Generate ${section.count} speaking tasks for ${levelLabel}.

LEVEL CEILING:
${levelGuide}

Generate them now.`;
    fallback = [
      { task: 'Introduce yourself in German', example: 'Ich heiße Anna. Ich komme aus England. Ich bin 25 Jahre alt.', pointsToInclude: ['Name', 'Country', 'Age'] },
      { task: 'Ask someone their name and where they come from', example: 'Wie heißen Sie? Woher kommen Sie?', pointsToInclude: ['Ask name', 'Ask origin'] },
      { task: 'Ask politely for a glass of water in a restaurant', example: 'Entschuldigung, ich hätte gern ein Glas Wasser, bitte.', pointsToInclude: ['Politeness', 'Specific request'] }
    ].slice(0, section.count);
  }

  const raw = await callApi(systemPrompt, userPrompt);
  try {
    const parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
    return Array.isArray(parsed) && parsed.length > 0 ? parsed : fallback;
  } catch {
    return fallback;
  }
}

// AI grader for writing tasks. Returns { score 0-1, feedback: string, rubric: { content, grammar, range } }
async function gradeWriting(task, pointsToInclude, studentText) {
  const raw = await callApi(
    `You grade A1/A2 German writing at the Goethe rubric. Return ONLY valid JSON:
{
  "score": 0.0-1.0 (how well it fulfils the task),
  "rubric": { "content": 0.0-1.0, "grammar": 0.0-1.0, "range": 0.0-1.0 },
  "feedback": "2-3 sentences of constructive feedback in English",
  "corrections": "1-2 specific grammar corrections from the text"
}
Be encouraging but honest. Pass = 0.6+.`,
    `Task: ${task}
Required points: ${pointsToInclude?.join(', ') || 'fulfil the task'}

Student wrote:
"""
${studentText}
"""

Grade it now.`
  );
  try {
    return JSON.parse(raw.replace(/```json|```/g, '').trim());
  } catch {
    return { score: 0.5, rubric: { content: 0.5, grammar: 0.5, range: 0.5 }, feedback: 'Auto-grader unavailable. Review your answer manually.', corrections: '' };
  }
}

// AI grader for speaking: compares SR transcript + task requirements
async function gradeSpeaking(task, pointsToInclude, transcript) {
  const raw = await callApi(
    `You grade A1/A2 German speaking. Return ONLY valid JSON:
{
  "score": 0.0-1.0,
  "feedback": "2-3 sentences of constructive feedback in English",
  "matched": ["which required points were covered"]
}`,
    `Task: ${task}
Required points: ${pointsToInclude?.join(', ') || 'fulfil the task'}

Speech-to-text transcript (may contain errors):
"${transcript}"

Grade it now, giving benefit of doubt for ASR errors.`
  );
  try {
    return JSON.parse(raw.replace(/```json|```/g, '').trim());

// ─── EXAM RUNTIME ────────────────────────────────────────────────────────────
async function startExam(key) {
  const template = EXAM_TEMPLATES[key];
  if (!template) return;
  STATE.exam = {
    key,
    template,
    sectionIdx: 0,
    itemIdx: 0,
    answers: {},
    startedAt: Date.now(),
    sectionDeadline: 0,
    timer: null,
    phase: 'intro',
    result: null,
    loading: false,
    response: '', // scratch for writing/speaking text input
    speaking: false, // during mic capture
    speechTranscript: '',
  };
  STATE.view = 'exam';
  render();
}

async function beginExamSection(idx) {
  const exam = STATE.exam;
  if (!exam) return;
  const section = exam.template.sections[idx];
  exam.sectionIdx = idx;
  exam.itemIdx = 0;
  exam.answers[section.id] = [];
  exam.response = '';
  exam.speechTranscript = '';
  exam.phase = 'running';
  exam.loading = true;
  render();
  // Generate items for this section
  try {
    exam.items = await generateExamSection(exam.template.level, section);
  } catch {
    exam.items = [];
  }
  exam.loading = false;
  // Start the timer
  exam.sectionDeadline = Date.now() + section.timeMin * 60 * 1000;
  clearInterval(exam.timer);
  exam.timer = setInterval(() => {
    const remaining = exam.sectionDeadline - Date.now();
    if (remaining <= 0) {
      clearInterval(exam.timer);
      advanceExamSection();
    } else {
      // just force a re-render to update the visible timer
      const timerEl = document.querySelector('.exam-timer');
      if (timerEl) {
        const m = Math.floor(remaining / 60000);
        const s = Math.floor((remaining % 60000) / 1000);
        timerEl.textContent = `${m}:${s.toString().padStart(2,'0')}`;
        if (remaining < 60000) timerEl.classList.add('urgent');
      }
    }
  }, 1000);
  render();
  // Auto-play first audio item for listening sections
  if (section.type === 'listening' && exam.items[0]?.audio) {
    setTimeout(() => speak(exam.items[0].audio), 500);
  }
}

// Called after the user picks/submits an answer to advance within a section
async function submitExamAnswer(answerValue) {
  const exam = STATE.exam;
  if (!exam) return;
  const section = exam.template.sections[exam.sectionIdx];
  const item = exam.items[exam.itemIdx];
  if (!item) return;

  // Grading varies per section type
  let graded;
  if (section.type === 'mixed' || section.type === 'listening' || section.type === 'reading') {
    graded = { answer: answerValue, correct: answerValue === item.answer, score: answerValue === item.answer ? 1 : 0, expected: item.answer };
  } else if (section.type === 'writing') {
    exam.loading = true; render();
    const r = await gradeWriting(item.task, item.pointsToInclude, answerValue);
    graded = { answer: answerValue, score: r.score || 0, feedback: r.feedback, rubric: r.rubric, corrections: r.corrections };
    exam.loading = false;
  } else if (section.type === 'speaking') {
    exam.loading = true; render();
    const r = await gradeSpeaking(item.task, item.pointsToInclude, answerValue);
    graded = { answer: answerValue, score: r.score || 0, feedback: r.feedback, matched: r.matched };
    exam.loading = false;
  }

  exam.answers[section.id].push(graded);

  // Advance
  if (exam.itemIdx + 1 >= exam.items.length) {
    // Section done
    clearInterval(exam.timer);
    advanceExamSection();
  } else {
    exam.itemIdx++;
    exam.response = '';
    exam.speechTranscript = '';
    render();
    // Auto-play next audio if listening
    if (section.type === 'listening' && exam.items[exam.itemIdx]?.audio) {
      setTimeout(() => speak(exam.items[exam.itemIdx].audio), 300);
    }
  }
}

function advanceExamSection() {
  const exam = STATE.exam;
  if (!exam) return;
  clearInterval(exam.timer);
  const nextIdx = exam.sectionIdx + 1;
  if (nextIdx >= exam.template.sections.length) {
    // Exam done — compute result
    finishExam();
  } else {
    // Show inter-section screen
    exam.phase = 'between';
    exam.sectionIdx = nextIdx;
    render();
  }
}

function finishExam() {
  const exam = STATE.exam;
  if (!exam) return;
  clearInterval(exam.timer);
  exam.phase = 'result';
  // Per-section scores
  const perSection = exam.template.sections.map(s => {
    const answers = exam.answers[s.id] || [];
    const scoreSum = answers.reduce((a, x) => a + (x.score || 0), 0);
    const pct = answers.length > 0 ? scoreSum / answers.length : 0;
    return { id: s.id, title: s.title, score: pct, answered: answers.length, total: s.count };
  });
  const overall = perSection.reduce((a, s) => a + s.score, 0) / perSection.length;
  const passed = overall >= exam.template.passThreshold;
  exam.result = { perSection, overall, passed };
  // Persist result
  const exams = STATE.prog.exams || [];
  exams.push({ key: exam.key, passed, overall, when: Date.now() });
  STATE.prog = { ...STATE.prog, exams };
  saveProg(STATE.prog);
  render();
}

function abandonExam() {
  const exam = STATE.exam;
  if (exam?.timer) clearInterval(exam.timer);
  STATE.exam = null;
  STATE.view = 'home';
  STATE.homeTab = 'practice';
  render();
}

const CORPUS_KEY = 'dt-exercise-corpus-v1';
const CORPUS_CAP = 1000; // approximate upper bound to keep localStorage <5MB

function loadCorpus() {
  try {
    const parsed = JSON.parse(localStorage.getItem(CORPUS_KEY) || '{}');
    return {
      exercises: parsed.exercises || {},
      meta: parsed.meta || { version: 1, firstSeenAt: Date.now(), lastUpdatedAt: Date.now(), totalServed: 0, totalFlagged: 0 }
    };
  } catch {
    return { exercises: {}, meta: { version: 1, firstSeenAt: Date.now(), lastUpdatedAt: Date.now(), totalServed: 0, totalFlagged: 0 } };
  }
}

function saveCorpus(corpus) {
  try {
    corpus.meta.lastUpdatedAt = Date.now();
    localStorage.setItem(CORPUS_KEY, JSON.stringify(corpus));
  } catch (err) {
    // Likely quota exceeded — evict oldest exercises until it fits
    console.warn('Corpus save failed, evicting oldest:', err);
    const entries = Object.entries(corpus.exercises);
    entries.sort((a, b) => (a[1].provenance?.generatedAt || 0) - (b[1].provenance?.generatedAt || 0));
    const keepCount = Math.floor(entries.length * 0.8);
    corpus.exercises = Object.fromEntries(entries.slice(-keepCount));
    try { localStorage.setItem(CORPUS_KEY, JSON.stringify(corpus)); } catch {}
  }
}

// Small, stable hash for dedup (not crypto — just needs to avoid collisions for ~10k exercises)
// FNV-1a 32-bit variant
function hashString(s) {
  let h = 0x811c9dc5;
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = (h * 0x01000193) >>> 0;
  }
  return h.toString(16).padStart(8, '0');
}

function normalizeText(s) {
  return (s || '').toString().trim().toLowerCase().replace(/\s+/g, ' ').replace(/[.,!?;:]+$/, '');
}

function ensureSrs(word) {

}

// ─── PROGRESS HELPERS ────────────────────────────────────────────────────────
function passed(id, diff) { return !!(STATE.prog.passed?.[id]?.[diff]); }
function topicDone(id) { return ['easy','medium','hard','extraHard','rapidFire'].every(d => passed(id, d)); }
function setPass(id, diff) {
  const p = STATE.prog.passed || {};
  if (!p[id]) p[id] = {};
  p[id][diff] = true;
  STATE.prog.passed = p;
  saveProg(STATE.prog);
}
function hasDebt(id) { return !!(STATE.prog.debts?.[id]); }
function addDebt(id) {
  const d = STATE.prog.debts || {};
  d[id] = true;
  STATE.prog.debts = d;
  saveProg(STATE.prog);
}
function clearDebt(id) {
  if (STATE.prog.debts?.[id]) {
    delete STATE.prog.debts[id];
    saveProg(STATE.prog);
  }
}
function isDebtBlocked(lesson) {
  // Check if any lesson within DEBT_BLOCK_DISTANCE before this one has unpaid RF debt
  const idx = CURRICULUM.indexOf(lesson);
  for (let i = Math.max(0, idx - DEBT_BLOCK_DISTANCE); i < idx; i++) {
    const prev = CURRICULUM[i];
    if (prev && hasDebt(prev.id)) return prev;
  }
  return null;
}
function isLocked(lesson) {
  const idx = CURRICULUM.indexOf(lesson);
  if (idx === 0) return false;
  const prev = CURRICULUM[idx - 1];
  return prev && !topicDone(prev.id);
}

// ─── VOICE ────────────────────────────────────────────────────────────────────
let gVoice = null;
function initVoice() {
  if (window.SpeechRecognition || window.webkitSpeechRecognition) STATE.voiceOk = true;
  const lv = () => { gVoice = window.speechSynthesis?.getVoices().find(v => v.lang.startsWith('de')) || null; };
  lv();
  window.speechSynthesis?.addEventListener('voiceschanged', lv);
}
function speak(txt) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(txt);
  u.lang = 'de-DE'; u.rate = 0.85;
  if (gVoice) u.voice = gVoice;
  u.onstart = () => { STATE.speaking = true; render(); };
  u.onend = () => { STATE.speaking = false; render(); };
  window.speechSynthesis.speak(u);
}
let recog = null;
function startListen(cb) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  recog = new SR(); recog.lang = 'de-DE'; recog.continuous = false; recog.interimResults = false;
  recog.onresult = e => { cb(e.results[0][0].transcript); STATE.listening = false; render(); };
  recog.onerror = () => { STATE.listening = false; render(); };
  recog.onend = () => { STATE.listening = false; render(); };
  recog.start(); STATE.listening = true; render();
}

// ─── API ──────────────────────────────────────────────────────────────────────
let lastProvider = '';
async function callApi(system, user, history = []) {
  const msgs = history.length ? [...history, {role:'user',content:user}] : [{role:'user',content:user}];
  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ system, messages: msgs, max_tokens: 2000 })
    });
    const d = await r.json();
    if (d.provider) lastProvider = d.provider;
    return d.content?.[0]?.text || '';
  } catch (err) {
    console.error('callApi error:', err);
    return '';
  }
}

// ─── LESSON GENERATION ────────────────────────────────────────────────────────
async function generateLesson(lesson) {
  // Check cache first
  const cache = STATE.lessonCache;
  if (cache[lesson.id]) return cache[lesson.id];

  const outline = lesson.aiOutline;
  const grammar = outline.grammar?.join('\n• ');
  const vocab = outline.vocab?.join('\n• ');
  const examples = outline.examples?.join('\n• ');
  const mistakes = outline.mistakes?.join('\n• ');

  const generated = await callApi(
    `You are writing a comprehensive German language textbook lesson for a motivated adult learner. 
    This must be genuinely thorough — equivalent to a full textbook chapter, not a summary.
    Use these EXACT section markers: [INTRO] [SECTION:Title] (repeat for each section) [VOCAB] [EXAMPLES] [SUMMARY] [MISTAKES] [TIPS]
    
    VOCAB format: German term with article/plural — English meaning (one per line, 20-30 items minimum)
    EXAMPLES format: German sentence — English translation (one per line, 8-10 minimum)  
    SUMMARY format: bullet points starting with • (5-6 items)
    MISTAKES format: numbered list 1. 2. 3. (3-5 items, specific and practical)
    TIPS format: numbered list 1. 2. 3. (3 items, genuine insider tips)
    
    Be comprehensive. Cover every nuance. Include tables where relevant. Use real examples. Write as if a student's exam depends on this.`,
    `Write a comprehensive textbook lesson on: "${lesson.title}" (${lesson.unit})
    
    Grammar to cover (cover ALL of these thoroughly):
    • ${grammar}
    
    Vocabulary (include ALL of these, add more if relevant):
    • ${vocab}
    
    Example sentences to include (include ALL of these plus more):
    • ${examples}
    
    Common mistakes to address:
    • ${mistakes}
    
    Context: ${lesson.intro}
    
    Write the complete lesson now. Be thorough. Students need to be exam-ready after reading this.`
  );

  // Cache it
  cache[lesson.id] = generated;
  saveLessonCache(cache);
  return generated;
}

// ─── EXERCISE CORPUS: CAPTURE / TAG / RECORD ─────────────────────────────────
// Infer an exercise type from its shape + question/answer text.
function inferExerciseType(ex) {
  if (Array.isArray(ex.options) && ex.options.length > 0) return 'mc';
  const q = (ex.question || '').toLowerCase();
  if (q.includes('translate') && q.includes('german')) return 'translate_en_de';
  if (q.includes('translate') && q.includes('english')) return 'translate_de_en';
  if ((ex.hint || '').toLowerCase().includes('word bank')) return 'fill_blank';
  if (q.includes('fix') || q.includes('error') || q.includes('correct')) return 'error_correction';
  if (q.includes('___') || q.includes('_____')) return 'fill_blank';
  return 'free_production';
}

// Build grammar tags from the lesson metadata (free — no extra AI call).
function inferGrammarTags(lesson) {
  const tags = new Set();
  if (lesson?.level) tags.add(`level_${lesson.level}`);
  const outline = lesson?.aiOutline?.grammar || [];
  outline.forEach(g => {
    const s = g.toString().toLowerCase();
    // Heuristic taxonomy — map free-text grammar descriptions to canonical tags
    if (/nominativ/.test(s)) tags.add('nominative');
    if (/akkusativ|accusative/.test(s)) tags.add('accusative');
    if (/dativ|dative/.test(s)) tags.add('dative');
    if (/genitiv|genitive/.test(s)) tags.add('genitive');
    if (/perfekt|perfect/.test(s)) tags.add('perfekt');
    if (/präteritum|preterite|simple past/.test(s)) tags.add('präteritum');
    if (/präsens|present tense/.test(s)) tags.add('present_tense');
    if (/modal/.test(s)) tags.add('modal_verb');
    if (/strong verb|unregelmäßig/.test(s)) tags.add('strong_verb');
    if (/separable|trennbar/.test(s)) tags.add('separable_verb');
    if (/reflexive|reflexiv/.test(s)) tags.add('reflexive_verb');
    if (/imperativ|imperative/.test(s)) tags.add('imperative');
    if (/negation|kein|nicht/.test(s)) tags.add('negation');
    if (/pronoun|pronomen/.test(s)) tags.add('pronoun');
    if (/plural/.test(s)) tags.add('plural');
    if (/adjective ending|declension|adjektivend/.test(s)) tags.add('adjective_declension');
    if (/comparative|komparativ/.test(s)) tags.add('comparative');
    if (/w-fragen|w-question|question word/.test(s)) tags.add('w_questions');
    if (/v2|word order|satzstellung/.test(s)) tags.add('word_order_v2');
    if (/preposition|präposition/.test(s)) tags.add('preposition');
    if (/wechselpräposition|two-way/.test(s)) tags.add('wechselpraeposition');
    if (/article|artikel|der.*die.*das/i.test(g)) tags.add('article');
    if (/possessive/.test(s)) tags.add('possessive');
    if (/conjunction|weil|dass|wenn/.test(s)) tags.add('conjunction');
    if (/sein|haben/.test(s) && /verb/.test(s)) tags.add('sein_haben');
  });
  return [...tags];
}

// Build vocab tags by cross-referencing lesson vocab against the exercise text.
function inferVocabTags(ex, lesson) {
  const text = `${ex.question || ''} ${ex.answer || ''} ${(ex.options || []).join(' ')}`.toLowerCase();
  const tags = [];
  (lesson?.vocab || []).forEach(entry => {
    const de = Array.isArray(entry) ? entry[0] : entry;
    if (!de) return;
    const rootWord = de.split(',')[0].trim().replace(/^(der|die|das)\s+/i, '');
    if (rootWord.length >= 3 && text.includes(rootWord.toLowerCase())) {
      tags.push(rootWord);
    }
  });
  return tags;
}

// Main capture: idempotent, returns the exercise (augmented with .corpusId).
function captureExercise(ex, ctx) {
  if (!ex || !ex.question || !ex.answer) return ex;
  const corpus = STATE.corpus;
  const hash = hashString(normalizeText(ex.question) + '|' + normalizeText(ex.answer));
  const existing = corpus.exercises[hash];

  if (existing) {
    // Already seen — just increment serve count
    existing.stats.timesServed = (existing.stats.timesServed || 0) + 1;
    corpus.meta.totalServed = (corpus.meta.totalServed || 0) + 1;
    saveCorpus(corpus);
    ex.corpusId = hash;
    return ex;
  }

  // New exercise — insert
  const entry = {
    id: `ex_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 7)}`,
    hash,
    lessonId: ctx.lesson?.id,
    lessonTitle: ctx.lesson?.title,
    level: ctx.lesson?.level || 'unknown',
    difficulty: ctx.difficulty || 'unknown',
    type: inferExerciseType(ex),
    question: ex.question,
    answer: ex.answer,
    options: ex.options || [],
    hint: ex.hint || '',
    grammarTags: inferGrammarTags(ctx.lesson),
    vocabTags: inferVocabTags(ex, ctx.lesson),
    provenance: {
      generatedBy: typeof lastProvider !== 'undefined' ? lastProvider : 'unknown',
      generatedAt: Date.now(),
      promptVersion: 'v2'
    },
    stats: {
      timesServed: 1,
      timesCorrect: 0,
      timesWrong: 0,
      successRate: null,
      avgResponseTimeMs: null
    },
    review: {
      flaggedBad: false,
      flaggedReason: null,
      flaggedAt: null,
      humanVerified: false
    }
  };

  corpus.exercises[hash] = entry;
  corpus.meta.totalServed = (corpus.meta.totalServed || 0) + 1;

  // Soft cap — if we exceed the limit, drop the oldest 10%
  const count = Object.keys(corpus.exercises).length;
  if (count > CORPUS_CAP) {
    const entries = Object.entries(corpus.exercises);
    entries.sort((a, b) => (a[1].provenance?.generatedAt || 0) - (b[1].provenance?.generatedAt || 0));
    // Drop ~10%, but preserve anything human-verified or flagged
    const toDrop = Math.max(1, Math.floor(count * 0.1));
    let dropped = 0;
    for (const [h, entry] of entries) {
      if (dropped >= toDrop) break;
      if (entry.review?.humanVerified || entry.review?.flaggedBad) continue;
      delete corpus.exercises[h];
      dropped++;
    }
  }

  saveCorpus(corpus);
  ex.corpusId = hash;
  return ex;
}

// Update success/wrong counts when a user answers. `correct` is boolean; `timeMs` optional.
function recordExerciseResult(corpusId, correct, timeMs) {
  if (!corpusId) return;
  const entry = STATE.corpus.exercises[corpusId];
  if (!entry) return;
  if (correct) entry.stats.timesCorrect++;
  else entry.stats.timesWrong++;
  const total = entry.stats.timesCorrect + entry.stats.timesWrong;
  entry.stats.successRate = total > 0 ? entry.stats.timesCorrect / total : null;
  if (timeMs && timeMs > 0) {
    const prev = entry.stats.avgResponseTimeMs;
    entry.stats.avgResponseTimeMs = prev ? Math.round((prev + timeMs) / 2) : timeMs;
  }
  saveCorpus(STATE.corpus);
}

// Flag an exercise as bad (user reports "this doesn't make sense")
function flagExercise(corpusId, reason) {
  if (!corpusId) return false;
  const entry = STATE.corpus.exercises[corpusId];
  if (!entry) return false;
  entry.review.flaggedBad = true;
  entry.review.flaggedReason = reason || null;
  entry.review.flaggedAt = Date.now();
  STATE.corpus.meta.totalFlagged = (STATE.corpus.meta.totalFlagged || 0) + 1;
  saveCorpus(STATE.corpus);
  return true;
}

function unflagExercise(corpusId) {
  const entry = STATE.corpus.exercises[corpusId];
  if (!entry) return;
  entry.review.flaggedBad = false;
  entry.review.flaggedReason = null;
  entry.review.flaggedAt = null;
  saveCorpus(STATE.corpus);
}

// Import a previously-exported backup JSON and merge into local storage.
// Conservative merge: new entries added, existing ones left alone (user picks what to import).
function importBackupFromFile() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json,.json';
  input.onchange = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        let added = { corpus: 0, vocab: 0, mistakes: 0 };
        // Corpus — merge by hash, keep highest stats
        if (data.corpus?.exercises) {
          Object.entries(data.corpus.exercises).forEach(([hash, entry]) => {
            if (!STATE.corpus.exercises[hash]) { STATE.corpus.exercises[hash] = entry; added.corpus++; }
          });
          saveCorpus(STATE.corpus);
        }
        // Learned vocab — don't overwrite existing SRS state
        if (data.learnedVocab) {
          Object.entries(data.learnedVocab).forEach(([de, meta]) => {
            if (!STATE.learnedVocab[de]) { STATE.learnedVocab[de] = meta; added.vocab++; }
          });
          saveLearnedVocab(STATE.learnedVocab);
        }
        // Mistakes — append, de-dup by question+expected+given+when
        if (Array.isArray(data.mistakes)) {
          const seen = new Set(STATE.mistakes.map(m => `${m.question}|${m.expected}|${m.given}|${m.when}`));
          data.mistakes.forEach(m => {
            const key = `${m.question}|${m.expected}|${m.given}|${m.when}`;
            if (!seen.has(key)) { STATE.mistakes.push(m); added.mistakes++; }
          });
          saveMistakes(STATE.mistakes);
        }
        // Progress — only restore if current progress is empty
        if (data.progress && (!STATE.prog.completed || STATE.prog.completed.length === 0)) {
          STATE.prog = data.progress;
          saveProg(STATE.prog);
        }
        alert(`Imported: ${added.corpus} exercises, ${added.vocab} vocab, ${added.mistakes} mistakes.`);
        render();
      } catch (err) {
        alert('Import failed: ' + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// Download the full corpus (+ optional progress/vault/mistakes) as a JSON file
function exportCorpusJson({ includeAll = false } = {}) {
  const payload = includeAll ? {
    exportedAt: new Date().toISOString(),
    corpus: STATE.corpus,
    progress: STATE.prog,
    learnedVocab: STATE.learnedVocab,
    mistakes: STATE.mistakes,
    lessonCache: STATE.lessonCache,
  } : {
    exportedAt: new Date().toISOString(),
    corpus: STATE.corpus,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `deutsch-tutor-${includeAll ? 'full-backup' : 'corpus'}-${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ─── EXERCISE GENERATION ─────────────────────────────────────────────────────
const LEVEL_GUIDE = {
  foundation: `ABSOLUTE BEGINNER (pre-A1). The student has never studied German formally. STRICT RULES: Focus on recognition only — cognates, alphabet, pronunciation, and the 4 big German-vs-English differences (gender, cases, V2 rule, noun capitalisation). NO verb conjugation exercises. NO case exercises. NO sentence construction from scratch. Questions can be in English asking about German concepts. When using German, stick to the cognates and example sentences from the lesson verbatim. Max 5 German words per sentence.`,
  a11: `A1.1 LEVEL — early beginner. STRICT RULES: Present tense only. Simple Subject-Verb-Object sentences. Max 6 words per German sentence. Only use pronouns ich/du/er/sie/es/wir/ihr/sie, the verbs sein/haben and any verbs taught in this or earlier lessons, and the vocabulary list provided. NO Perfekt, NO Präteritum (except war/hatte if already taught), NO subordinate clauses, NO modal verbs unless explicitly in the lesson.`,
  a12: `A1.2 LEVEL — late beginner. STRICT RULES: Present tense + Perfekt for common verbs. Nominative and Accusative cases. Modal verbs (können, wollen, müssen, möchten). Max 8 words per German sentence. NO Dative unless the lesson teaches it. NO subordinate clauses unless taught. Use only vocabulary from this lesson plus basic A1.1 words.`,
  a2: `A2 LEVEL. Present, Perfekt, and Präteritum for common verbs (war, hatte, ging, kam, sagte). All four cases allowed but keep Genitive rare. Simple subordinate clauses with weil/dass/wenn allowed. Max 12 words per sentence. Stay within A2 — no Konjunktiv II, no Passiv unless the lesson teaches it.`,
  phrases: `PHRASE MEMORISATION. Focus on matching, recognising and producing set phrases exactly as taught. Do NOT ask for grammatical analysis or conjugation.`,
  exam: `A2 EXAM REVIEW. Mixed A1-A2 content. Keep within A2 ceiling.`
};

async function generateExercises(lesson, diff, count) {
  const levelKey = lesson.level || 'a11';
  const levelGuide = LEVEL_GUIDE[levelKey] || LEVEL_GUIDE.a11;

  const diffDesc = {
    easy: `${count} multiple-choice questions testing recognition. 4 options (A/B/C/D). answer = correct letter. options = array of 4 strings. Questions should be EASY at this level — matching words to meanings, choosing the correct article, picking the right cognate. The wrong options should be plausible but clearly wrong once the student thinks.`,
    medium: `${count} guided production exercises with HEAVY support. Fill-in-the-blank or short translation WITH a word bank hint that contains the correct answer plus 1-2 distractors. hint = "Word bank: x, y, z". options = []. Keep sentences as short as the level allows.`,
    hard: `${count} free production exercises. Simple translations English→German, at the level ceiling NOT above it. hint = "". options = []. Stay SHORT — do not write sentences longer than the level allows. Test vocab and core grammar taught in THIS lesson.`,
    extraHard: `${count} stretch exercises combining concepts from THIS lesson only. Sentences can be slightly longer but must not exceed the level ceiling. Include 1-2 error-correction questions where the student fixes a mistake. Do NOT introduce grammar or vocabulary beyond the level.`,
    rapidFire: `${count} short mixed questions covering this lesson. Mix recognition and production. Keep each question answerable in under 15 seconds. Stay within the level.`
  };

  const lessonContent = STATE.generatedLesson || lesson.intro;
  const allVocab = (lesson.vocab || []).map(v => Array.isArray(v) ? `${v[0]} = ${v[1]}` : v).join('\n');
  const examples = (lesson.examples || []).map(e => Array.isArray(e) ? `${e[0]} — ${e[1]}` : e).join('\n');

  const raw = await callApi(
    `You generate German language exercises calibrated to a SPECIFIC CEFR level. Return ONLY a valid JSON array. No markdown. No prose outside JSON.
     Each object MUST have exactly: {question: string, answer: string, hint: string, options: array}
     Multiple choice: answer is ONE letter A/B/C/D. options is an array of exactly 4 strings.
     Non-MC: options is []. hint is a word bank or "".
     ABSOLUTE REQUIREMENT: Respect the CEFR level ceiling. Do not use vocabulary the student has not been taught. Do not use grammar beyond the level. Err on the side of being too easy rather than too hard.`,
    `Generate ${count} ${diff} exercises for German lesson: "${lesson.title}" (${lesson.unit})

LEVEL CEILING — obey strictly:
${levelGuide}

LESSON CONTENT (the ONLY topics you may test):
${lessonContent?.slice(0, 1200) || lesson.intro}

VOCABULARY ALLOWED (stick to this list + very basic words like ich/du/ist/und/der/die/das):
${allVocab}

EXAMPLE SENTENCES FROM THE LESSON (match this complexity — do NOT exceed it):
${examples}

EXERCISE TYPE SPECIFICATION:
${diffDesc[diff]}

Make exercises directly test what was taught in THIS lesson. Match the complexity of the example sentences above. When in doubt, make it simpler.`
  );

  let parsed;
  try {
    parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
    if (!Array.isArray(parsed)) parsed = [];
  } catch {
    parsed = [{
      question: `Translate to German: "I am learning German."`,
      answer: diff === 'easy' ? 'B' : 'Ich lerne Deutsch.',
      hint: diff === 'medium' ? 'Word bank: Ich, lerne, Deutsch' : '',
      options: diff === 'easy' ? ['Ich bin Deutsch', 'Ich lerne Deutsch', 'Ich bin Student', 'Ich habe Deutsch'] : []
    }];
  }
  // Pull-and-store: capture every generated exercise into the corpus with dedup + tags.
  // Returns the same array but each ex now carries a .corpusId for downstream result tracking.
  return parsed.map(ex => captureExercise(ex, { lesson, difficulty: diff }));
}

// Generate sentence items for the listening / speaking phases.
// Returns an array of { de, en } where `de` is spoken/said and `en` is the translation (shown after).
async function generateSentenceItems(lesson, mode, count) {
  const levelKey = lesson.level || 'a11';
  const levelGuide = LEVEL_GUIDE[levelKey] || LEVEL_GUIDE.a11;
  const allVocab = (lesson.vocab || []).map(v => Array.isArray(v) ? `${v[0]} = ${v[1]}` : v).join('\n');
  const examples = (lesson.examples || []).map(e => Array.isArray(e) ? `${e[0]} — ${e[1]}` : e).join('\n');
  const lessonContent = STATE.generatedLesson || lesson.intro;

  const modeDesc = mode === 'listen'
    ? `${count} short German sentences for a DICTATION / LISTENING exercise. Sentences should be clearly pronounceable by a text-to-speech engine — avoid long compound words where possible. Each sentence 4-8 words at A1, max 10 at A2. Cover different structures taught in this lesson.`
    : `${count} short German sentences for a PRONUNCIATION / SPEAKING exercise. Phrases should be common, useful, and confident to say aloud — greetings, simple statements, short questions. 3-7 words each. Should feel natural when spoken, not textbook-stiff.`;

  const raw = await callApi(
    `You generate German sentence pairs. Return ONLY a valid JSON array — no markdown, no prose.
Each object has exactly: {"de": "German sentence", "en": "English translation"}.
ABSOLUTE REQUIREMENT: respect the CEFR level ceiling. Use only vocabulary taught in this lesson plus very basic words.`,
    `${modeDesc}

Lesson: "${lesson.title}" (${lesson.unit})

LEVEL CEILING:
${levelGuide}

LESSON CONTENT:
${lessonContent?.slice(0, 800) || lesson.intro}

VOCABULARY:
${allVocab}

EXAMPLE SENTENCES (match complexity):
${examples}

Generate ${count} sentence pairs now.`
  );

  let parsed;
  try {
    parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
    if (!Array.isArray(parsed)) parsed = [];
  } catch {
    parsed = [
      { de: 'Ich lerne Deutsch.', en: 'I am learning German.' },
      { de: 'Das ist mein Haus.', en: 'That is my house.' },
      { de: 'Wie geht es dir?', en: 'How are you?' },
      { de: 'Ich komme aus England.', en: 'I come from England.' },
      { de: 'Der Hund ist groß.', en: 'The dog is big.' },
    ].slice(0, count);
  }

  return parsed.filter(item => item && item.de && item.en);
}

async function gradeAnswer(question, expected, given) {
  const raw = await callApi(
    `You are grading a German language exercise for a beginner. Return ONLY valid JSON — no markdown, no prose:
{
  "grade": "correct" | "almost" | "incorrect",
  "explanation": "ONE encouraging sentence, max 15 words",
  "correction": "the fully correct German answer",
  "reason": "SHORT grammar reason WHY it was wrong or almost — e.g. 'Accusative needs den, not der', 'sein conjugates as ist for er/sie/es', 'noun must be capitalised'. If grade is 'correct', reason can be empty string."
}
Be lenient for minor spelling or capitalisation slips — mark those as 'almost' with a kind reason.
When grade is 'incorrect' or 'almost', the 'reason' field is the most important — make it concrete and teach the rule in plain English.`,
    `Question: "${question}"
Expected answer: "${expected}"
Student wrote: "${given}"

Grade it now.`
  );
  try {
    const parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
    return {
      grade: parsed.grade || 'incorrect',
      explanation: parsed.explanation || '',
      correction: parsed.correction || expected,
      reason: parsed.reason || ''
    };
  } catch {
    return { grade: 'incorrect', explanation: 'Could not evaluate. Correct answer shown below.', correction: expected, reason: '' };
  }
}

// ─── RAPID FIRE TIMER ─────────────────────────────────────────────────────────
function startRFTimer() {
  STATE.rfTimeLeft = RAPID_FIRE_TIME;
  clearInterval(STATE.rfTimer);
  STATE.rfTimer = setInterval(() => {
    STATE.rfTimeLeft--;
    // Update just the timer bar without full re-render
    const fill = document.querySelector('.rf-fill');
    if (fill) {
      const pct = (STATE.rfTimeLeft / RAPID_FIRE_TIME) * 100;
      fill.style.width = pct + '%';
      if (pct < 20) fill.classList.add('urgent');
    }
    const timeEl = document.querySelector('.rf-time');
    if (timeEl) {
      const m = Math.floor(STATE.rfTimeLeft / 60);
      const s = STATE.rfTimeLeft % 60;
      timeEl.textContent = `${m}:${s.toString().padStart(2,'0')}`;
    }
    if (STATE.rfTimeLeft <= 0) {
      clearInterval(STATE.rfTimer);
      finishRapidFire(false);
    }
  }, 1000);
}

// ─── PHASE TRANSITIONS ────────────────────────────────────────────────────────
const PHASE_ORDER = ['lesson', 'gap', 'easy', 'medium', 'listen', 'hard', 'speak', 'extraHard', 'conv', 'rapidFire'];

async function startPhase(phase) {
  STATE.phase = phase;
  STATE.grade = null; STATE.answer = ''; STATE.exIdx = 0; STATE.exScores = [];

  if (phase === 'gap') {
    STATE.gapIdx = 0; STATE.gapAnswer = ''; STATE.gapRevealed = false; STATE.gapScore = 0;
    render();
  } else if (['easy','medium','hard','extraHard'].includes(phase)) {
    STATE.exLoading = true; render();
    const count = EXERCISE_COUNTS[phase];
    try {
      STATE.exercises = await generateExercises(STATE.lesson, phase, count);
    } catch {
      STATE.exercises = [{
        question: `Translate to German: "I am learning German."`,
        answer: phase === 'easy' ? 'B' : 'Ich lerne Deutsch.',
        hint: phase === 'medium' ? 'Word bank: Ich, lerne, Deutsch' : '',
        options: phase === 'easy' ? ['Ich bin Deutsch', 'Ich lerne Deutsch', 'Ich bin Student', 'Ich habe Deutsch'] : []
      }];
    }
    STATE.exLoading = false; render();
  } else if (phase === 'conv') {
    STATE.msgs = []; STATE.convLoading = true; render();
    try {
      const opener = await callApi(
        `You are Max, a warm German tutor. Topic: "${STATE.lesson?.title}". Keep German A1/A2 level. 
        ALWAYS end with "📝 Correction:" noting grammar/vocab mistakes or "Alles gut! ✓" if no errors.
        Include English translations in brackets for all German phrases.`,
        'Start the conversation with a warm greeting related to today\'s topic and one simple question. Include English translation.'
      );
      STATE.msgs = [{role:'assistant', content: opener}];
    } catch {
      STATE.msgs = [{role:'assistant', content:'Hallo! Wie geht es dir? (Hello! How are you?)'}];
    }
    STATE.convLoading = false; render();
  } else if (phase === 'rapidFire') {
    STATE.rfLoading = true; render();
    try {
      STATE.rfQuestions = await generateExercises(STATE.lesson, 'rapidFire', EXERCISE_COUNTS.rapidFire);
    } catch { STATE.rfQuestions = []; }
    STATE.rfIdx = 0; STATE.rfAnswer = ''; STATE.rfAnswers = [];
    STATE.rfLoading = false;
    render();
    setTimeout(() => startRFTimer(), 500);
  } else if (phase === 'listen') {
    STATE.listenLoading = true;
    STATE.listenItems = []; STATE.listenIdx = 0; STATE.listenAnswer = ''; STATE.listenGrade = null; STATE.listenPlayed = 0;
    render();
    try {
      STATE.listenItems = await generateSentenceItems(STATE.lesson, 'listen', EXERCISE_COUNTS.listen);
    } catch { STATE.listenItems = []; }
    STATE.listenLoading = false;
    render();
    // Auto-play first item after render so the user hears it immediately
    if (STATE.listenItems[0]) setTimeout(() => { speak(STATE.listenItems[0].de); STATE.listenPlayed = 1; }, 400);
  } else if (phase === 'speak') {
    STATE.speakLoading = true;
    STATE.speakItems = []; STATE.speakIdx = 0; STATE.speakHeard = ''; STATE.speakGrade = null;
    render();
    try {
      STATE.speakItems = await generateSentenceItems(STATE.lesson, 'speak', EXERCISE_COUNTS.speak);
    } catch { STATE.speakItems = []; }
    STATE.speakLoading = false;
    render();
  } else {
    render();
  }
}

// Listening: grade a typed answer against the target
function submitListenAnswer() {
  const item = STATE.listenItems[STATE.listenIdx];
  if (!item || !STATE.listenAnswer.trim()) return;
  const score = similarityScore(STATE.listenAnswer, item.de);
  const grade = score >= 0.92 ? 'correct' : score >= 0.7 ? 'almost' : 'incorrect';
  STATE.listenGrade = { grade, score, target: item.de, en: item.en };
  if (grade === 'incorrect') {
    logMistake({ type: 'listen', question: 'Dictation: (audio)', expected: item.de, given: STATE.listenAnswer, lessonTitle: STATE.lesson?.title, lessonId: STATE.lesson?.id });
  }
  render();
}

function nextListenItem() {

// Speaking: user taps mic, app transcribes, we fuzzy-match against target
function startSpeakAttempt() {

function nextSpeakItem() {

}

function resolveMistake(index) {

// ─── SPACED REPETITION (SM-2 LITE) ───────────────────────────────────────────
// Quality: 0=forgot, 1=hard, 2=good, 3=easy
function updateReviewSchedule(word, quality) {
  ensureSrs(word);
  word.reviews++;
  const now = Date.now();
  const DAY = 24 * 60 * 60 * 1000;

  if (quality === 0) {
    // Forgot — reset interval, lapse counter up
    word.lapses++;
    word.interval = 0;
    word.ease = Math.max(1.3, word.ease - 0.2);
    word.due = now + 10 * 60 * 1000; // 10 minutes — quick re-review
  } else {
    // Remembered (to some degree)
    if (word.interval === 0) word.interval = quality === 1 ? 1 : quality === 2 ? 1 : 3;
    else if (word.interval < 3) word.interval = quality === 1 ? word.interval : quality === 2 ? 3 : 6;
    else word.interval = Math.round(word.interval * word.ease * (quality === 1 ? 0.6 : quality === 3 ? 1.3 : 1));

    // Adjust ease
    word.ease = Math.max(1.3, word.ease + (quality === 1 ? -0.15 : quality === 3 ? 0.15 : 0));
    word.due = now + word.interval * DAY;
  }
  saveLearnedVocab(STATE.learnedVocab);
}

// Returns words due for review, sorted by urgency (most overdue first)
function getDueWords(limit = 20) {
  const now = Date.now();
  const entries = Object.entries(STATE.learnedVocab || {});
  const due = entries
    .map(([de, meta]) => { ensureSrs(meta); return [de, meta]; })
    .filter(([, meta]) => meta.due <= now)
    .sort((a, b) => a[1].due - b[1].due);
  return due.slice(0, limit);
}

function countDueWords() {
  const now = Date.now();
  return Object.values(STATE.learnedVocab || {}).filter(w => {
    ensureSrs(w);
    return w.due <= now;
  }).length;
}

// ─── MNEMONIC GENERATOR (AI, cached per word) ───────────────────────────────
async function generateMnemonicFor(de) {
  const word = STATE.learnedVocab?.[de];
  if (!word) return;
  if (word.mnemonic) { render(); return; } // already cached
  word.mnemonic = '⏳ Thinking...';
  saveLearnedVocab(STATE.learnedVocab);
  render();

  try {
    const raw = await callApi(
      `You create vivid, silly, memorable mnemonics for German vocabulary — the "keyword method".
Find a sound-alike English word or phrase inside the German word, then paint a bizarre mental image that links it to the meaning.
Keep it under 25 words. Be concrete and visual. Reply with ONLY the mnemonic sentence — no preamble, no quotes.`,
      `German word: "${de}"
English meaning: "${word.en}"

Create the mnemonic now.`
    );
    const text = raw?.trim().replace(/^["']|["']$/g, '').slice(0, 220);
    word.mnemonic = text || `Think: ${de} = ${word.en}`;
  } catch {
    word.mnemonic = `Think: ${de} = ${word.en}`;
  }
  saveLearnedVocab(STATE.learnedVocab);
  render();
}

// ─── VOCAB PRACTICE (LOCAL, NO AI) ───────────────────────────────────────────
// Prioritises due words (SRS). Falls back to random selection if nothing is due.
function buildVocabQuiz(count = 10) {
  const entries = Object.entries(STATE.learnedVocab || {});
  if (entries.length < 4) return [];

  // Lazy-migrate every entry (ensures SRS fields exist) and split into due / not-due
  entries.forEach(([, meta]) => ensureSrs(meta));
  const now = Date.now();
  const due = entries.filter(([, meta]) => meta.due <= now).sort((a,b) => a[1].due - b[1].due);
  const notDue = entries.filter(([, meta]) => meta.due > now).sort(() => Math.random() - 0.5);

  // Prefer due words; fill remainder with random not-due to get to `count`
  const picks = [...due, ...notDue].slice(0, Math.min(count, entries.length));
  const allEnglish = entries.map(([, meta]) => meta.en).filter(Boolean);

  return picks.map(([de, meta]) => {
    const distractors = [];
    const pool = allEnglish.filter(en => en !== meta.en);
    while (distractors.length < 3 && pool.length) {
      const i = Math.floor(Math.random() * pool.length);
      distractors.push(pool.splice(i, 1)[0]);
    }
    const options = [meta.en, ...distractors].sort(() => Math.random() - 0.5);
    return { de, en: meta.en, options, lessonTitle: meta.lessonTitle, wasDue: meta.due <= now };
  });
}

function pickVocabAnswer(choice) {

// Called when user rates recall quality (0-3). Updates SRS schedule + logs result.
function rateVocabRecall(quality) {
  const p = STATE.practice;
  const q = p.questions[p.idx];
  if (!q || p.picked === null || p.rated) return;
  const correct = p.picked === q.en;
  p.results.push({ de: q.de, correct, chosen: p.picked, expected: q.en, quality });
  if (correct) p.score++;
  // Log mistake to journal (even if user self-rated "good" after getting it wrong)
  if (!correct) logMistake({ type: 'vocab', question: q.de, expected: q.en, given: p.picked, lessonTitle: q.lessonTitle });
  // Update SRS
  const word = STATE.learnedVocab[q.de];
  if (word) updateReviewSchedule(word, quality);
  p.rated = true;
  render();
}

  const done = STATE.prog.completed || [];

  if (!STATE.answer.trim() || STATE.grading) return;
  STATE.grading = true;
  const startedAt = Date.now();

  const ex = STATE.exercises[STATE.exIdx];
  const g = await gradeAnswer(ex.question, ex.answer, STATE.answer);

  else logMistake({
    type: 'exercise',

    given: STATE.answer,
    reason: g.reason || '',

function mcSelect(opt, idx) {
  const ex = STATE.exercises[STATE.exIdx];
  const letter = ['A','B','C','D'][idx];
  const correct = letter === ex.answer;
  const correctText = ex.options[['A','B','C','D'].indexOf(ex.answer)];

    type: 'exercise-mc',

// ─── UMLAUT TOOLBAR ───────────────────────────────────────────────────────────
function insertUmlaut(char) {
  const el = STATE.lastInput || document.querySelector('input:focus, textarea:focus');
  if (!el) return;
  const start = el.selectionStart || el.value.length;
  const end = el.selectionEnd || el.value.length;
  el.value = el.value.slice(0, start) + char + el.value.slice(end);
  el.selectionStart = el.selectionEnd = start + char.length;
  el.focus();
  el.dispatchEvent(new Event('input', {bubbles:true}));
}

function umlauts() {
  return `<div class="umlaut-bar">
    ${['ä','ö','ü','Ä','Ö','Ü','ß'].map(c => `<button class="umlaut-btn" type="button" onmousedown="event.preventDefault()" onclick="insertUmlaut('${c}')">${c}</button>`).join('')}
  </div>`;
}

// Inline speaker button — drop anywhere in rendered HTML next to German text.
// Uses a data attribute so a single delegated listener handles all clicks.
function speakBtn(text, opts = {}) {
  const size = opts.size || 'sm'; // sm | md | lg
  const safe = String(text).replace(/"/g, '&quot;');
  const fontSize = size === 'lg' ? 18 : size === 'md' ? 14 : 12;
  const padding = size === 'lg' ? '5px 10px' : size === 'md' ? '3px 8px' : '2px 6px';
  return `<button class="speak-btn" data-speak="${safe}" aria-label="Hear pronunciation" style="background:transparent;border:none;cursor:pointer;padding:${padding};font-size:${fontSize}px;line-height:1;opacity:.55;vertical-align:middle" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.55">🔊</button>`;
}

// Normalised string similarity — returns 0..1. Used for fuzzy grading of listening/speaking.
function normaliseForCompare(s) {
  return (s || '')
    .toString()
    .toLowerCase()
    .replace(/[.,!?;:"'„"«»()\-—–]/g, '')
    .replace(/ä/g, 'ae').replace(/ö/g, 'oe').replace(/ü/g, 'ue').replace(/ß/g, 'ss')
    .replace(/\s+/g, ' ')
    .trim();
}

function similarityScore(a, b) {
  const na = normaliseForCompare(a);
  const nb = normaliseForCompare(b);
  if (!na || !nb) return 0;
  if (na === nb) return 1;
  // Levenshtein-based similarity
  const m = na.length, n = nb.length;
  const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      const cost = na[i - 1] === nb[j - 1] ? 0 : 1;
      dp[i][j] = Math.min(dp[i - 1][j] + 1, dp[i][j - 1] + 1, dp[i - 1][j - 1] + cost);
    }
  }
  return 1 - dp[m][n] / Math.max(m, n);
}

// ─── PARSE LESSON CONTENT ─────────────────────────────────────────────────────
function parseLessonContent(text, lesson) {
  // ── phrases[] format (p1, p2 — older format) ──────────────────────────────
  if (lesson.phrases && !lesson.sections) {
    let html = `<p class="body" style="color:var(--muted);margin-bottom:14px">${lesson.intro}</p>`;
    html += `<div class="lesson-h">💬 Key Phrases</div><div>`;
    lesson.phrases.forEach(p => {
      html += `<div class="ex-row"><div class="ex-de">${p.de} ${speakBtn(p.de, {size:'md'})}</div><div class="ex-en">${p.en}</div></div>`;
    });
    html += `</div>`;
    if (lesson.summary?.length) {
      html += `<div class="lesson-h">📝 Quick Summary</div>`;
      lesson.summary.forEach(s => html += `<div class="summary-item">• ${s}</div>`);
    }
    if (lesson.mistakes?.length) {
      html += `<div class="lesson-h">⚠️ Common Mistakes</div>`;
      lesson.mistakes.forEach((m,i) => html += `<div class="mistake-box">${i+1}. ${m}</div>`);
    }
    if (lesson.tips?.length) {
      html += `<div class="lesson-h">💡 Pro Tips</div>`;
      lesson.tips.forEach((t,i) => html += `<div class="tip-box">${i+1}. ${t}</div>`);
    }
    return html;
  }

  // ── sections[] format (all modern lessons) ────────────────────────────────
  if (lesson.sections) {
    let html = '';
    html += `<p class="body" style="color:var(--muted);margin-bottom:14px">${lesson.intro}</p>`;
    if (lesson.cognates?.length) {
      html += `<div class="lesson-h">German–English Cognates</div><div style="columns:2;gap:12px">`;
      lesson.cognates.forEach(([d,e]) => html += `<div class="vocab-row"><span class="vocab-de">${d} ${speakBtn(d)}</span><span class="vocab-en">${e}</span></div>`);
      html += '</div>';
    }
    lesson.sections.forEach(s => {
      html += `<div class="lesson-h">${s.h}</div><div class="lesson-body">${s.body.replace(/\n/g,'<br>')}</div>`;
    });
    if (lesson.vocab?.length) {
      html += `<div class="lesson-h">📖 Key Vocabulary</div><div>`;
      lesson.vocab.forEach(([d,e]) => html += `<div class="vocab-row"><span class="vocab-de">${d} ${speakBtn(d)}</span><span class="vocab-en">${e}</span></div>`);
      html += '</div>';
    }
    if (lesson.examples?.length) {
      html += `<div class="lesson-h">💬 Example Sentences</div><div>`;
      lesson.examples.forEach(([d,e]) => html += `<div class="ex-row"><div class="ex-de">${d} ${speakBtn(d, {size:'md'})}</div><div class="ex-en">${e}</div></div>`);
      html += '</div>';
    }
    if (lesson.summary?.length) {
      html += `<div class="lesson-h">📝 Quick Summary</div>`;
      lesson.summary.forEach(s => html += `<div class="summary-item">• ${s}</div>`);
    }
    if (lesson.mistakes?.length) {
      html += `<div class="lesson-h">⚠️ Common Mistakes</div>`;
      lesson.mistakes.forEach((m,i) => html += `<div class="mistake-box">${i+1}. ${m}</div>`);
    }
    if (lesson.tips?.length) {
      html += `<div class="lesson-h">💡 Pro Tips</div>`;
      lesson.tips.forEach((t,i) => html += `<div class="tip-box">${i+1}. ${t}</div>`);
    }
    return html;
  }

  // AI-generated text path (legacy — aiOutline is null for all lessons, but kept for safety)
  if (!text) return `<p class="body">${lesson.intro || 'Loading lesson...'}</p>`;

  let html = '';
  const sections = text.split(/\[(INTRO|SECTION:[^\]]+|VOCAB|EXAMPLES|SUMMARY|MISTAKES|TIPS)\]/);

  for (let i = 1; i < sections.length; i += 2) {
    const key = sections[i];
    const content = (sections[i+1] || '').trim();

    if (key === 'INTRO') {
      html += `<p class="body" style="color:var(--muted);margin-bottom:14px">${content}</p>`;
    } else if (key.startsWith('SECTION:')) {
      const title = key.replace('SECTION:', '');
      html += `<div class="lesson-h">${title}</div>`;
      html += `<div class="lesson-body">${content}</div>`;
    } else if (key === 'VOCAB') {
      html += `<div class="lesson-h">Key Vocabulary</div><div>`;
      content.split('\n').filter(l => l.includes('—')).forEach(line => {
        const [de, en] = line.split('—');
        html += `<div class="vocab-row"><span class="vocab-de">${(de||'').trim()}</span><span class="vocab-en">${(en||'').trim()}</span></div>`;
      });
      html += `</div>`;
    } else if (key === 'EXAMPLES') {
      html += `<div class="lesson-h">Example Sentences</div><div>`;
      content.split('\n').filter(l => l.includes('—')).forEach(line => {
        const [de, en] = line.split('—');
        html += `<div class="ex-row"><div class="ex-de">${(de||'').trim()}</div><div class="ex-en">${(en||'').trim()}</div></div>`;
      });
      html += `</div>`;
    } else if (key === 'SUMMARY') {
      html += `<div class="lesson-h">Quick Summary</div>`;
      content.split('\n').filter(l => l.startsWith('•')).forEach(line => {
        html += `<div class="summary-item">${line.replace('•','').trim()}</div>`;
      });
    } else if (key === 'MISTAKES') {
      html += `<div class="lesson-h">⚠️ Common Mistakes</div>`;
      content.split('\n').filter(l => /^\d+\./.test(l)).forEach(line => {
        html += `<div class="mistake-box">${line}</div>`;
      });
    } else if (key === 'TIPS') {
      html += `<div class="lesson-h">💡 Pro Tips</div>`;
      content.split('\n').filter(l => /^\d+\./.test(l)).forEach(line => {
        html += `<div class="tip-box">${line}</div>`;
      });
    }
  }

  return html || `<p>${lesson.intro}</p>`;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  const { view, lesson, phase, prog } = STATE;
  const completed = prog.completed || [];
  const streak = prog.streak || 0;

  // ── HOME ────────────────────────────────────────────────────────────────────
